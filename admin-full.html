<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>LiquorBelle — Order Manager</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://res.cloudinary.com">
<link rel="dns-prefetch" href="https://res.cloudinary.com">
<link rel="preconnect" href="https://liquorbelle-mpesa-backend.onrender.com">
<link rel="dns-prefetch" href="https://liquorbelle-mpesa-backend.onrender.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>

<style>
/* ============================================
   CSS - ROOT & RESET
   ============================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #800000;
  --primary-light: #9a1c1c;
  --primary-dark: #5c0000;
  --green: #1A6B35;
  --green-light: #22883f;
  --gold: #B8860B;
  --gold-light: #d4a017;
  --gold-bg: #fdf6e3;
  --white: #FFFFFF;
  --bg: #F8F5F1;
  --bg2: #F0EBE4;
  --border: #DDD5CB;
  --border-light: #EDE8E2;
  --text: #1C1917;
  --text-secondary: #44403C;
  --muted: #78716C;
  --red: #B91C1C;
  --red-bg: #FEF2F2;
  --wa: #25D366;
  --wa-dark: #128C7E;
  --call: #1D4ED8;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 7px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --glass: rgba(255,255,255,0.7);
  --glass-border: rgba(255,255,255,0.3);
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ============================================
   CSS - SCROLLBAR
   ============================================ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); border-radius: 10px; }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-light); }

/* ============================================
   CSS - CATEGORY COLORS
   ============================================ */
.cat-beer { background: #F59E0B; color: white; }
.cat-brandy { background: #B8860B; color: white; }
.cat-bourbon { background: #8B4513; color: white; }
.cat-rum { background: #DC2626; color: white; }
.cat-spirits { background: #7C3AED; color: white; }
.cat-liqueur { background: #EC4899; color: white; }
.cat-juice { background: #EF4444; color: white; }
.cat-soda { background: #3B82F6; color: white; }
.cat-water { background: #06B6D4; color: white; }
.cat-energy { background: #F97316; color: white; }
.cat-cigar { background: #92400E; color: white; }
.cat-accessory { background: #6B7280; color: white; }
.category-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 50px;
  font-size: 10px;
  font-weight: 600;
  margin-left: 6px;
}

/* ============================================
   CSS - LOGIN (Glassmorphism)
   ============================================ */
.login-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.login-modal-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 40px 32px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: var(--shadow-lg);
  position: relative;
}
.login-modal-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: var(--radius) var(--radius) 0 0;
}
.login-logo img {
  width: 70px;
  height: 70px;
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(128,0,0,0.2);
}
.login-logo h2 {
  color: var(--primary);
  font-size: 1.5rem;
  font-weight: 800;
}
.login-logo h2 .gold { color: var(--gold); }
.login-logo p {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 24px;
}
.password-input-wrapper {
  position: relative;
  width: 100%;
  margin-bottom: 16px;
}
.login-input {
  width: 100%;
  padding: 14px 50px 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px;
  background: white;
  transition: var(--transition);
}
.login-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 4px rgba(184,134,11,0.12);
}
.password-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--muted);
  font-size: 18px;
  background: none;
  border: none;
  padding: 0;
}
.password-toggle:hover { color: var(--gold); }
.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: var(--transition);
}
.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(128,0,0,0.3);
}
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.login-error {
  color: var(--red);
  font-size: 13px;
  margin-top: 12px;
  min-height: 20px;
}

/* ============================================
   CSS - BUTTONS (Modern)
   ============================================ */
.btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 600;
  transition: var(--transition);
  font-size: 13.5px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  line-height: 1;
}
.btn:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(128,0,0,0.25);
}
.btn:active { transform: scale(0.97); }
.btn-sm { padding: 7px 14px; font-size: 12px; gap: 5px; }
.btn-green { background: var(--green); }
.btn-green:hover { background: var(--green-light); box-shadow: 0 4px 16px rgba(26,107,53,0.3); }
.btn-outline {
  background: transparent;
  border: 2px solid var(--border);
  color: var(--text-secondary);
}
.btn-outline:hover { background: var(--bg2); border-color: var(--muted); transform: none; }
.btn-red { background: var(--red); }
.btn-red:hover { background: #991b1b; box-shadow: 0 4px 16px rgba(185,28,28,0.3); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
}
.btn-gold:hover {
  box-shadow: 0 4px 20px rgba(184,134,11,0.35);
  transform: translateY(-2px);
}
.btn-wa { background: var(--wa); color: white; }
.btn-wa:hover { background: var(--wa-dark); }
.btn-call { background: var(--call); color: white; }
.btn-call:hover { background: #1e40af; }
.btn:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none !important;
}

/* ============================================
   CSS - HEADER (Glass)
   ============================================ */
.admin-header {
  background: rgba(128,0,0,0.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: white;
  padding: 0 5%;
  height: 64px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.15);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo-img {
  height: 36px;
  width: auto;
  border-radius: 8px;
}
.logo-text {
  font-weight: 700;
  font-size: 1rem;
  white-space: nowrap;
}
.logo-text .gold { color: var(--gold-light); }
.logo-divider {
  width: 1px;
  height: 24px;
  background: rgba(255,255,255,0.2);
}
.header-logout {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.85);
  padding: 7px 14px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
  white-space: nowrap;
}
.header-logout:hover {
  background: rgba(255,255,255,0.2);
  color: white;
}

/* ============================================
   CSS - CONTAINER & STATS
   ============================================ */
.container {
  max-width: 1380px;
  margin: 0 auto;
  padding: 24px 5%;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px 22px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
}
.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.stat-card h4 {
  font-size: 10.5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.stat-card .value {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
  margin-top: 4px;
}
.stat-card .sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}
.stat-card .icon {
  position: absolute;
  right: 16px;
  bottom: 16px;
  font-size: 32px;
  opacity: 0.08;
}

/* ============================================
   CSS - SEARCH & FILTERS
   ============================================ */
.search-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
  align-items: center;
}
.search-input-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-input-wrap i {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 16px;
}
.search-input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13.5px;
  background: white;
  transition: var(--transition);
}
.search-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
}
.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-select {
  padding: 10px 16px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: white;
  cursor: pointer;
  min-width: 170px;
  transition: var(--transition);
}
.filter-select:focus {
  outline: none;
  border-color: var(--gold);
}
.filter-stats {
  font-size: 12px;
  color: var(--muted);
  background: var(--gold-bg);
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--gold-bg);
}
.clear-btn {
  background: var(--gold-bg);
  border: 2px solid var(--border);
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  font-size: 13px;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
}
.clear-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.refresh-btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  font-size: 13px;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 8px rgba(184,134,11,0.25);
}
.refresh-btn:hover {
  box-shadow: 0 4px 16px rgba(184,134,11,0.35);
  transform: translateY(-2px);
}
.help-text {
  font-size: 12px;
  color: var(--muted);
  background: var(--gold-bg);
  padding: 8px 12px;
  border-radius: 6px;
  border-left: 3px solid var(--gold);
  margin-bottom: 14px;
}
.help-text i { color: var(--gold); margin-right: 4px; }

/* ============================================
   CSS - ORDERS LIST
   ============================================ */
.orders-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.order-card {
  background: var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}
.order-card:hover {
  box-shadow: var(--shadow-lg);
}
.order-header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  padding: 14px 18px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  align-items: start;
}
.order-id {
  font-family: monospace;
  font-weight: 700;
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  background: rgba(0,0,0,0.2);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 5px;
}
.order-customer {
  font-weight: 700;
  color: white;
  font-size: 15px;
  margin-top: 5px;
}
.order-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-top: 8px;
}
.order-meta-chip {
  background: rgba(255,255,255,0.15);
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 11.5px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: rgba(255,255,255,0.9);
}
.order-phone-chip {
  background: rgba(255,255,255,0.15);
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 11.5px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: rgba(255,255,255,0.9);
}
.order-header-right {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
}
.order-status {
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.status-pending { background: #FFF7ED; color: #C2410C; border: 1px solid #FED7AA; }
.status-paid { background: #F0FDF4; color: #15803D; border: 1px solid #bbf7d0; }
.status-delivered { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
.contact-buttons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.contact-buttons a { text-decoration: none; }
.order-items {
  padding: 12px 18px;
  background: var(--bg);
  max-height: 280px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.order-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: white;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border-light);
}
.order-item-img {
  width: 46px;
  height: 46px;
  object-fit: cover;
  border-radius: 7px;
  background: var(--bg2);
  flex-shrink: 0;
}
.order-item-details { flex: 1; min-width: 0; }
.order-item-name {
  font-weight: 600;
  font-size: 13.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.order-item-qty {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.order-item-price {
  font-weight: 700;
  color: var(--text);
  font-size: 14px;
  flex-shrink: 0;
}
.order-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px;
  border-top: 1px solid var(--border-light);
  gap: 12px;
  flex-wrap: wrap;
  background: white;
}
.order-total {
  font-size: 19px;
  font-weight: 800;
  color: var(--text);
}
.order-total-label {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}
.order-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.order-actions .btn { padding: 8px 15px; font-size: 12.5px; }
.completed-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
  background: #F0FDF4;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid #bbf7d0;
}
.order-meta-small {
  font-size: 10.5px;
  color: var(--muted);
  margin-top: 4px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.order-meta-small span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

/* ============================================
   CSS - UTILITY
   ============================================ */
.loading-spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: white;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 2000;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); }
.toast.success { background: var(--green); }
.empty-state {
  text-align: center;
  padding: 56px 24px;
  color: var(--muted);
}
.empty-state i { font-size: 40px; display: block; margin-bottom: 12px; color: var(--border); }
.empty-state p { font-size: 14px; }

/* ============================================
   CSS - RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
  .admin-header {
    padding: 10px 4%;
    height: auto;
    flex-wrap: wrap;
  }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .order-header { grid-template-columns: 1fr; }
  .order-header-right {
    align-items: flex-start;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 8px;
  }
  .contact-buttons { justify-content: flex-start; }
  .order-footer { flex-direction: column; align-items: stretch; }
  .order-actions { justify-content: flex-start; }
  .container { padding: 12px 3%; }
  .btn-sm { padding: 6px 11px; font-size: 12px; }
  .order-item { flex-wrap: wrap; }
  .order-item-img { width: 40px; height: 40px; }
  .search-bar { flex-direction: column; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .filter-select { width: 100%; }
  .clear-btn, .refresh-btn { justify-content: center; width: 100%; }
  .order-meta-small { font-size: 9px; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .stat-card .value { font-size: 22px; }
  .order-actions .btn { flex: 1; justify-content: center; }
}
</style>
</head>
<body>

<!-- ============================================
   HTML - LOGIN MODAL
   ============================================ -->
<div id="cashierLoginModal" class="login-modal-overlay" style="display:flex;">
  <div class="login-modal-card">
    <div class="login-logo">
      <img src="https://res.cloudinary.com/dvqjgbdhp/image/upload/f_auto,q_auto,w_120,c_fit/v1780905905/WhatsApp_Image_2026-06-04_at_3.41.50_PM_saprsh.jpg" alt="LiquorBelle" loading="eager">
      <h2>Cashier <span class="gold">Login</span></h2>
      <p>Enter password to access order manager</p>
    </div>
    <form id="cashierLoginForm" onsubmit="event.preventDefault(); submitCashierLogin();">
      <div class="password-input-wrapper">
        <input type="password" id="cashierPassword" class="login-input" placeholder="Enter cashier password" autocomplete="off">
        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
          <i class="ph ph-eye" id="togglePasswordIcon"></i>
        </button>
      </div>
      <button type="submit" class="login-btn" id="loginBtn">Login</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>
</div>

<!-- ============================================
   HTML - HEADER
   ============================================ -->
<div class="admin-header">
  <div class="logo">
    <img class="logo-img" src="https://res.cloudinary.com/dvqjgbdhp/image/upload/f_auto,q_auto,w_120,c_fit/v1780905905/WhatsApp_Image_2026-06-04_at_3.41.50_PM_saprsh.jpg" alt="LiquorBelle" loading="eager">
    <span class="logo-divider"></span>
    <span class="logo-text">Liquor<span class="gold">Belle</span> Orders</span>
  </div>
  <button class="header-logout" onclick="logout()"><i class="ph ph-sign-out"></i> Logout</button>
</div>

<!-- ============================================
   HTML - MAIN CONTENT
   ============================================ -->
<div class="container">

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Help -->
  <div class="help-text"><i class="ph ph-info"></i> Manage all orders. Auto-refresh every 10 seconds. <strong>Mark Paid</strong> after payment confirmation, <strong>Mark Delivered</strong> when handed to customer.</div>

  <!-- Filters -->
  <div class="filter-bar">
    <select id="dateFilter" class="filter-select" onchange="applyFilters()">
      <option value="all">📅 All Time</option>
      <option value="1">📆 Last 24 Hours</option>
      <option value="7">📆 Last 7 Days</option>
      <option value="30">📆 Last 30 Days</option>
      <option value="90">📆 Last 90 Days</option>
      <option value="365">📅 Last 1 Year</option>
    </select>
    <select id="statusFilter" class="filter-select" onchange="applyFilters()">
      <option value="all">📋 All Orders</option>
      <option value="pending">⏳ Pending</option>
      <option value="paid">✅ Paid</option>
      <option value="delivered">🚚 Delivered</option>
    </select>
    <span class="filter-stats" id="orderCountDisplay"></span>
  </div>

  <!-- Search -->
  <div class="search-bar">
    <div class="search-input-wrap">
      <i class="ph ph-magnifying-glass"></i>
      <input type="text" id="orderSearch" class="search-input" placeholder="Search by customer name, email, or phone...">
    </div>
    <button class="clear-btn" onclick="clearSearch()"><i class="ph ph-x"></i> Clear</button>
    <button class="refresh-btn" onclick="manualRefresh()"><i class="ph ph-arrow-clockwise"></i> Refresh</button>
  </div>

  <!-- Orders List -->
  <div id="ordersContainer" class="orders-list">
    <div class="empty-state"><i class="ph ph-spinner"></i><p>Loading orders...</p></div>
  </div>

</div>

<!-- ============================================
   HTML - TOAST
   ============================================ -->
<div id="toast" class="toast"></div>

<!-- ============================================
     SINGLE EXTERNAL SCRIPT — all logic in app.js
     ============================================ -->
<script src="/liquorbelle/app.js"></script>

</body>
</html>
