<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>LiquorBelle — Order Manager</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://res.cloudinary.com">
<link rel="dns-prefetch" href="https://res.cloudinary.com">
<link rel="preconnect" href="https://liquorbelle-mpesa-backend.onrender.com">
<link rel="dns-prefetch" href="https://liquorbelle-mpesa-backend.onrender.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>

<style>
/* ============================================
   CSS - ROOT & RESET
   ============================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #800000;
  --primary-light: #9a1c1c;
  --primary-dark: #5c0000;
  --green: #1A6B35;
  --green-light: #22883f;
  --gold: #B8860B;
  --gold-light: #d4a017;
  --gold-bg: #fdf6e3;
  --white: #FFFFFF;
  --bg: #F8F5F1;
  --bg2: #F0EBE4;
  --border: #DDD5CB;
  --border-light: #EDE8E2;
  --text: #1C1917;
  --text-secondary: #44403C;
  --muted: #78716C;
  --red: #B91C1C;
  --red-bg: #FEF2F2;
  --wa: #25D366;
  --wa-dark: #128C7E;
  --call: #1D4ED8;
  --radius: 16px;
  --radius-sm: 10px;
  --radius-xs: 7px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.1);
  --glass: rgba(255,255,255,0.7);
  --glass-border: rgba(255,255,255,0.3);
  --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
body {
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ============================================
   CSS - SCROLLBAR
   ============================================ */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); border-radius: 10px; }
::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold-light); }

/* ============================================
   CSS - CATEGORY COLORS
   ============================================ */
.cat-beer { background: #F59E0B; color: white; }
.cat-brandy { background: #B8860B; color: white; }
.cat-bourbon { background: #8B4513; color: white; }
.cat-rum { background: #DC2626; color: white; }
.cat-spirits { background: #7C3AED; color: white; }
.cat-liqueur { background: #EC4899; color: white; }
.cat-juice { background: #EF4444; color: white; }
.cat-soda { background: #3B82F6; color: white; }
.cat-water { background: #06B6D4; color: white; }
.cat-energy { background: #F97316; color: white; }
.cat-cigar { background: #92400E; color: white; }
.cat-accessory { background: #6B7280; color: white; }
.category-badge {
  display: inline-block;
  padding: 2px 10px;
  border-radius: 50px;
  font-size: 10px;
  font-weight: 600;
  margin-left: 6px;
}

/* ============================================
   CSS - LOGIN (Glassmorphism)
   ============================================ */
.login-modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2000;
}
.login-modal-card {
  background: var(--glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 40px 32px;
  width: 90%;
  max-width: 400px;
  text-align: center;
  box-shadow: var(--shadow-lg);
  position: relative;
}
.login-modal-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 4px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: var(--radius) var(--radius) 0 0;
}
.login-logo img {
  width: 70px;
  height: 70px;
  border-radius: 16px;
  margin-bottom: 12px;
  box-shadow: 0 4px 20px rgba(128,0,0,0.2);
}
.login-logo h2 {
  color: var(--primary);
  font-size: 1.5rem;
  font-weight: 800;
}
.login-logo h2 .gold { color: var(--gold); }
.login-logo p {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 24px;
}
.password-input-wrapper {
  position: relative;
  width: 100%;
  margin-bottom: 16px;
}
.login-input {
  width: 100%;
  padding: 14px 50px 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 15px;
  background: white;
  transition: var(--transition);
}
.login-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 4px rgba(184,134,11,0.12);
}
.password-toggle {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: var(--muted);
  font-size: 18px;
  background: none;
  border: none;
  padding: 0;
}
.password-toggle:hover { color: var(--gold); }
.login-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 16px;
  cursor: pointer;
  transition: var(--transition);
}
.login-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(128,0,0,0.3);
}
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.login-error {
  color: var(--red);
  font-size: 13px;
  margin-top: 12px;
  min-height: 20px;
}

/* ============================================
   CSS - BUTTONS (Modern)
   ============================================ */
.btn {
  background: var(--primary);
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 600;
  transition: var(--transition);
  font-size: 13.5px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  line-height: 1;
}
.btn:hover {
  background: var(--primary-light);
  transform: translateY(-2px);
  box-shadow: 0 4px 16px rgba(128,0,0,0.25);
}
.btn:active { transform: scale(0.97); }
.btn-sm { padding: 7px 14px; font-size: 12px; gap: 5px; }
.btn-green { background: var(--green); }
.btn-green:hover { background: var(--green-light); box-shadow: 0 4px 16px rgba(26,107,53,0.3); }
.btn-outline {
  background: transparent;
  border: 2px solid var(--border);
  color: var(--text-secondary);
}
.btn-outline:hover { background: var(--bg2); border-color: var(--muted); transform: none; }
.btn-red { background: var(--red); }
.btn-red:hover { background: #991b1b; box-shadow: 0 4px 16px rgba(185,28,28,0.3); }
.btn-gold {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
}
.btn-gold:hover {
  box-shadow: 0 4px 20px rgba(184,134,11,0.35);
  transform: translateY(-2px);
}
.btn-wa { background: var(--wa); color: white; }
.btn-wa:hover { background: var(--wa-dark); }
.btn-call { background: var(--call); color: white; }
.btn-call:hover { background: #1e40af; }
.btn:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  transform: none !important;
}

/* ============================================
   CSS - HEADER (Glass)
   ============================================ */
.admin-header {
  background: rgba(128,0,0,0.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: white;
  padding: 0 5%;
  height: 64px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.15);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.logo-img {
  height: 36px;
  width: auto;
  border-radius: 8px;
}
.logo-text {
  font-weight: 700;
  font-size: 1rem;
  white-space: nowrap;
}
.logo-text .gold { color: var(--gold-light); }
.logo-divider {
  width: 1px;
  height: 24px;
  background: rgba(255,255,255,0.2);
}
.header-logout {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.85);
  padding: 7px 14px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 12.5px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
  white-space: nowrap;
}
.header-logout:hover {
  background: rgba(255,255,255,0.2);
  color: white;
}

/* ============================================
   CSS - CONTAINER & STATS
   ============================================ */
.container {
  max-width: 1380px;
  margin: 0 auto;
  padding: 24px 5%;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 20px 22px;
  transition: var(--transition);
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
}
.stat-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.stat-card h4 {
  font-size: 10.5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
}
.stat-card .value {
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  line-height: 1.1;
  margin-top: 4px;
}
.stat-card .sub {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
}
.stat-card .icon {
  position: absolute;
  right: 16px;
  bottom: 16px;
  font-size: 32px;
  opacity: 0.08;
}

/* ============================================
   CSS - SEARCH & FILTERS
   ============================================ */
.search-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
  align-items: center;
}
.search-input-wrap {
  flex: 1;
  min-width: 200px;
  position: relative;
}
.search-input-wrap i {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--muted);
  font-size: 16px;
}
.search-input {
  width: 100%;
  padding: 10px 14px 10px 38px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13.5px;
  background: white;
  transition: var(--transition);
}
.search-input:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(184,134,11,0.12);
}
.filter-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 18px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-select {
  padding: 10px 16px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: white;
  cursor: pointer;
  min-width: 170px;
  transition: var(--transition);
}
.filter-select:focus {
  outline: none;
  border-color: var(--gold);
}
.filter-stats {
  font-size: 12px;
  color: var(--muted);
  background: var(--gold-bg);
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid var(--gold-bg);
}
.clear-btn {
  background: var(--gold-bg);
  border: 2px solid var(--border);
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  font-size: 13px;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text-secondary);
}
.clear-btn:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.refresh-btn {
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 500;
  font-size: 13px;
  transition: var(--transition);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  box-shadow: 0 2px 8px rgba(184,134,11,0.25);
}
.refresh-btn:hover {
  box-shadow: 0 4px 16px rgba(184,134,11,0.35);
  transform: translateY(-2px);
}
.help-text {
  font-size: 12px;
  color: var(--muted);
  background: var(--gold-bg);
  padding: 8px 12px;
  border-radius: 6px;
  border-left: 3px solid var(--gold);
  margin-bottom: 14px;
}
.help-text i { color: var(--gold); margin-right: 4px; }

/* ============================================
   CSS - ORDERS LIST
   ============================================ */
.orders-list {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.order-card {
  background: var(--glass);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: var(--transition);
}
.order-card:hover {
  box-shadow: var(--shadow-lg);
}
.order-header {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  padding: 14px 18px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  align-items: start;
}
.order-id {
  font-family: monospace;
  font-weight: 700;
  font-size: 12px;
  color: rgba(255,255,255,0.9);
  background: rgba(0,0,0,0.2);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 3px 10px;
  border-radius: 5px;
}
.order-customer {
  font-weight: 700;
  color: white;
  font-size: 15px;
  margin-top: 5px;
}
.order-meta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-top: 8px;
}
.order-meta-chip {
  background: rgba(255,255,255,0.15);
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 11.5px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: rgba(255,255,255,0.9);
}
.order-phone-chip {
  background: rgba(255,255,255,0.15);
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 11.5px;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  color: rgba(255,255,255,0.9);
}
.order-header-right {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: flex-end;
}
.order-status {
  padding: 5px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 700;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.status-pending { background: #FFF7ED; color: #C2410C; border: 1px solid #FED7AA; }
.status-paid { background: #F0FDF4; color: #15803D; border: 1px solid #bbf7d0; }
.status-delivered { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
.contact-buttons {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: flex-end;
}
.contact-buttons a { text-decoration: none; }
.order-items {
  padding: 12px 18px;
  background: var(--bg);
  max-height: 280px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.order-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: white;
  border-radius: var(--radius-xs);
  border: 1px solid var(--border-light);
}
.order-item-img {
  width: 46px;
  height: 46px;
  object-fit: cover;
  border-radius: 7px;
  background: var(--bg2);
  flex-shrink: 0;
}
.order-item-details { flex: 1; min-width: 0; }
.order-item-name {
  font-weight: 600;
  font-size: 13.5px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.order-item-qty {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}
.order-item-price {
  font-weight: 700;
  color: var(--text);
  font-size: 14px;
  flex-shrink: 0;
}
.order-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px;
  border-top: 1px solid var(--border-light);
  gap: 12px;
  flex-wrap: wrap;
  background: white;
}
.order-total {
  font-size: 19px;
  font-weight: 800;
  color: var(--text);
}
.order-total-label {
  font-size: 11px;
  color: var(--muted);
  margin-top: 1px;
}
.order-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.order-actions .btn { padding: 8px 15px; font-size: 12.5px; }
.completed-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 12px;
  font-weight: 600;
  color: var(--green);
  background: #F0FDF4;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid #bbf7d0;
}
.order-meta-small {
  font-size: 10.5px;
  color: var(--muted);
  margin-top: 4px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.order-meta-small span {
  display: inline-flex;
  align-items: center;
  gap: 5px;
}

/* ============================================
   CSS - UTILITY
   ============================================ */
.loading-spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.3);
  border-radius: 50%;
  border-top-color: white;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: var(--text);
  color: white;
  padding: 12px 24px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.3s ease;
  z-index: 2000;
  pointer-events: none;
  box-shadow: var(--shadow-lg);
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--red); }
.toast.success { background: var(--green); }
.empty-state {
  text-align: center;
  padding: 56px 24px;
  color: var(--muted);
}
.empty-state i { font-size: 40px; display: block; margin-bottom: 12px; color: var(--border); }
.empty-state p { font-size: 14px; }

/* ============================================
   CSS - RESPONSIVE
   ============================================ */
@media (max-width: 768px) {
  .admin-header {
    padding: 10px 4%;
    height: auto;
    flex-wrap: wrap;
  }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .order-header { grid-template-columns: 1fr; }
  .order-header-right {
    align-items: flex-start;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 8px;
  }
  .contact-buttons { justify-content: flex-start; }
  .order-footer { flex-direction: column; align-items: stretch; }
  .order-actions { justify-content: flex-start; }
  .container { padding: 12px 3%; }
  .btn-sm { padding: 6px 11px; font-size: 12px; }
  .order-item { flex-wrap: wrap; }
  .order-item-img { width: 40px; height: 40px; }
  .search-bar { flex-direction: column; }
  .filter-bar { flex-direction: column; align-items: stretch; }
  .filter-select { width: 100%; }
  .clear-btn, .refresh-btn { justify-content: center; width: 100%; }
  .order-meta-small { font-size: 9px; }
}
@media (max-width: 480px) {
  .stats-grid { grid-template-columns: 1fr 1fr; }
  .stat-card .value { font-size: 22px; }
  .order-actions .btn { flex: 1; justify-content: center; }
}
</style>
</head>
<body>

<!-- ============================================
   HTML - LOGIN MODAL
   ============================================ -->
<div id="cashierLoginModal" class="login-modal-overlay" style="display:flex;">
  <div class="login-modal-card">
    <div class="login-logo">
      <img src="https://res.cloudinary.com/dvqjgbdhp/image/upload/f_auto,q_auto,w_120,c_fit/v1780905905/WhatsApp_Image_2026-06-04_at_3.41.50_PM_saprsh.jpg" alt="LiquorBelle" loading="eager">
      <h2>Cashier <span class="gold">Login</span></h2>
      <p>Enter password to access order manager</p>
    </div>
    <form id="cashierLoginForm" onsubmit="event.preventDefault(); submitCashierLogin();">
      <div class="password-input-wrapper">
        <input type="password" id="cashierPassword" class="login-input" placeholder="Enter cashier password" autocomplete="off">

          <i class="ph ph-eye" id="togglePasswordIcon"></i>
        </button>

  </div>
</div>

<!-- ============================================
   HTML - MAIN CONTENT

<div class="container">

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Help -->
  <div class="help-text"><i class="ph ph-info"></i> Manage all orders. Auto-refresh every 10 seconds. <strong>Mark Paid</strong> after payment confirmation, <strong>Mark Delivered</strong> when handed to customer.</div>

<!-- ============================================
   HTML - TOAST
   ============================================ -->
<div id="toast" class="toast"></div>

<!-- ============================================
   JAVASCRIPT
   ============================================ -->
<script>
// ============================================
// CATEGORY CONFIG
// ============================================
var CATEGORY_LABELS = {
  'beer': 'Beer', 'brandy': 'Brandy', 'bourbon': 'Bourbon',
  'rum': 'Rum', 'spirits': 'Spirits', 'liqueur': 'Liqueur',
  'juice': 'Juice', 'soda': 'Soda', 'water': 'Water',
  'energy': 'Energy Drink', 'cigar': 'Cigar', 'accessory': 'Accessory'
};

var CATEGORY_COLORS = {
  'beer': 'cat-beer', 'brandy': 'cat-brandy', 'bourbon': 'cat-bourbon',
  'rum': 'cat-rum', 'spirits': 'cat-spirits', 'liqueur': 'cat-liqueur',
  'juice': 'cat-juice', 'soda': 'cat-soda', 'water': 'cat-water',
  'energy': 'cat-energy', 'cigar': 'cat-cigar', 'accessory': 'cat-accessory'
};

function getCategoryLabel(cat) {
  return CATEGORY_LABELS[cat] || cat || 'Uncategorized';
}

function getCategoryBadge(cat) {
  var label = getCategoryLabel(cat);
  var colorClass = CATEGORY_COLORS[cat] || 'cat-accessory';
  return '<span class="category-badge ' + colorClass + '">' + label + '</span>';
}

// ============================================
// IMAGE OPTIMIZATION
// ============================================
function optimizeImage(url, width) {
  if (!url) return '';
  if (!url.includes('cloudinary.com')) return url;
  var parts = url.split('/upload/');
  if (parts.length !== 2) return url;
  var w = width || 300;
  return parts[0] + '/upload/f_auto,q_auto,w_' + w + ',c_fit/' + parts[1];
}

// ============================================
// CONFIG
// ============================================
var API_BASE = 'https://liquorbelle-mpesa-backend.onrender.com';
var allOrders = [];
var filteredOrders = [];
var products = [];
var searchTerm = '';
var adminToken = localStorage.getItem('liquorbelle_cashier_token');
var pendingActions = new Map();
var currentDateFilter = 'all';
var currentStatusFilter = 'all';
var autoRefreshInterval = null;
var FALLBACK_IMG = '';

// ============================================
// PASSWORD TOGGLE
// ============================================
function togglePasswordVisibility() {
  var passwordInput = document.getElementById('cashierPassword');
  var toggleIcon = document.getElementById('togglePasswordIcon');
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleIcon.setAttribute('class', 'ph ph-eye-slash');
  } else {
    passwordInput.type = 'password';
    toggleIcon.setAttribute('class', 'ph ph-eye');
  }
}

// ============================================
// FILTERS
// ============================================
function applyFilters() {
  currentDateFilter = document.getElementById('dateFilter').value;
  currentStatusFilter = document.getElementById('statusFilter').value;

  var result = allOrders.slice();

  if (currentDateFilter !== 'all') {
    var daysAgo = new Date(Date.now() - parseInt(currentDateFilter) * 24 * 60 * 60 * 1000);
    result = result.filter(function(o) { return new Date(o.created_at) >= daysAgo; });
  }

  if (currentStatusFilter !== 'all') {
    result = result.filter(function(o) { return o.status === currentStatusFilter; });
  }

  filteredOrders = result;

  renderStats();
  renderOrders();
}

// ============================================
// TOAST
// ============================================
function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.toggle('error', isError);
  t.classList.toggle('success', !isError);
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(function() {
    t.classList.remove('show', 'error', 'success');
  }, 3200);
}

// ============================================
// PHONE HELPERS
// ============================================
function formatPhone(phone) {
  if (!phone) return '';
  var clean = phone.replace(/\D/g, '');
  if (clean.startsWith('0')) clean = '254' + clean.slice(1);
  if (!clean.startsWith('254')) clean = '254' + clean;
  return clean;
}

function formatDisplayPhone(phone) {
  if (!phone) return 'No phone';
  var display = phone.toString();
  if (display.length === 12 && display.startsWith('254')) return '0' + display.slice(3);
  if (display.length === 10 && (display.startsWith('07') || display.startsWith('01'))) return display;
  return display;
}

// ============================================
// AUTH
// ============================================
function getAuthHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': 'Bearer ' + adminToken
  };
}

async function cashierLogin(password) {
  try {
    var res = await fetch(API_BASE + '/api/cashier/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: password })
    });
    var data = await res.json();
    if (data.success && data.token) {
      adminToken = data.token;
      localStorage.setItem('liquorbelle_cashier_token', adminToken);
      localStorage.setItem('liquorbelle_admin_role', data.role);
      return true;
    }
    return false;
  } catch(e) {
    return false;
  }
}

function submitCashierLogin() {
  var password = document.getElementById('cashierPassword').value;
  var errorDiv = document.getElementById('loginError');
  errorDiv.innerText = '';

  if (!password) {
    errorDiv.innerText = 'Please enter your password.';
    return;
  }

  var btn = document.getElementById('loginBtn');
  var originalText = btn.innerHTML;
  btn.innerHTML = '<span class="loading-spinner"></span> Logging in...';
  btn.disabled = true;

  cashierLogin(password).then(function(success) {
    btn.innerHTML = originalText;
    btn.disabled = false;
    if (success) {
      document.getElementById('cashierLoginModal').style.display = 'none';
      initAfterLogin();
    } else {
      errorDiv.innerText = 'Invalid cashier password. Try again.';
      document.getElementById('cashierPassword').value = '';
      document.getElementById('cashierPassword').focus();
    }
  });
}

document.getElementById('cashierPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    submitCashierLogin();
  }
});

// ============================================
// LOAD PRODUCTS
// ============================================
async function loadProducts() {
  try {
    var res = await fetch(API_BASE + '/api/db/products');
    var data = await res.json();
    if (data.success) products = data.products;
  } catch(e) {
    products = [];
  }
}

// ============================================
// LOAD ORDERS
// ============================================
async function loadOrders() {
  if (!adminToken) { return; }
  try {
    var res = await fetch(API_BASE + '/api/admin/all-orders?limit=1000', {
      headers: getAuthHeaders()
    });

    if (res.status === 401 || res.status === 403) {
      localStorage.removeItem('liquorbelle_cashier_token');
      localStorage.removeItem('liquorbelle_admin_role');
      adminToken = null;
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      document.getElementById('cashierLoginModal').style.display = 'flex';
      return;
    }
    if (res.status === 429) {
      showToast('⚠️ Too many requests. Please wait...', true);
      return;
    }
    var data = await res.json();
    if (data.success) {
      allOrders = data.orders.sort(function(a, b) {
        return new Date(b.created_at) - new Date(a.created_at);
      });
      applyFilters();
    } else {
      allOrders = [];
      filteredOrders = [];
      renderStats();
      renderOrders();
    }
  } catch(e) {
    console.error('Error loading orders:', e);
    allOrders = [];
    filteredOrders = [];
    renderStats();
    renderOrders();
  }
}

// ============================================
// REFRESH
// ============================================
function manualRefresh() {
  showToast('Refreshing orders...');
  loadOrders();
}

// ============================================
// RENDER STATS
// ============================================
function renderStats() {
  var total = filteredOrders.length;
  var pending = filteredOrders.filter(function(o) { return o.status === 'pending'; }).length;
  var paid = filteredOrders.filter(function(o) { return o.status === 'paid'; }).length;
  var delivered = filteredOrders.filter(function(o) { return o.status === 'delivered'; }).length;

  var periodText = '';
  if (currentDateFilter === 'all') periodText = 'All Time';
  else if (currentDateFilter === '1') periodText = 'Last 24 Hours';
  else if (currentDateFilter === '7') periodText = 'Last 7 Days';
  else if (currentDateFilter === '30') periodText = 'Last 30 Days';
  else if (currentDateFilter === '90') periodText = 'Last 90 Days';
  else if (currentDateFilter === '365') periodText = 'Last Year';

  var statusText = '';
  if (currentStatusFilter === 'all') statusText = 'Orders';
  else if (currentStatusFilter === 'pending') statusText = 'Pending';
  else if (currentStatusFilter === 'paid') statusText = 'Paid';
  else if (currentStatusFilter === 'delivered') statusText = 'Delivered';

  document.getElementById('statsGrid').innerHTML =
    '<div class="stat-card"><h4>📊 ' + statusText + '</h4><div class="value">' + total + '</div><div class="sub">' + periodText + '</div><div class="icon">📊</div></div>' +
    '<div class="stat-card"><h4>⏳ Pending</h4><div class="value">' + pending + '</div><div class="sub">Need payment</div><div class="icon">⏳</div></div>' +
    '<div class="stat-card"><h4>✅ Paid</h4><div class="value">' + paid + '</div><div class="sub">Ready to deliver</div><div class="icon">✅</div></div>' +
    '<div class="stat-card"><h4>🚚 Delivered</h4><div class="value">' + delivered + '</div><div class="sub">Completed</div><div class="icon">🚚</div></div>';

  document.getElementById('orderCountDisplay').innerHTML = '📋 ' + total + ' order' + (total !== 1 ? 's' : '') + ' found';
}

// ============================================
// HELPERS
// ============================================
function getOrderDisplayId(order) {
  if (order.order_number) return order.order_number;
  if (order._id) {
    var idStr = order._id.toString();
    return idStr.slice(-8).toUpperCase();
  }
  return 'N/A';
}

function findProductImage(productName, productId) {
  if (!productName && !productId) return FALLBACK_IMG;

  if (productId) {
    for (var i = 0; i < products.length; i++) {
      if (products[i]._id === productId) {
        if (products[i].image) return products[i].image;
        break;
      }
    }
  }

  if (productName) {
    for (var i = 0; i < products.length; i++) {
      if (products[i].name && products[i].name.toLowerCase() === productName.toLowerCase()) {
        if (products[i].image) return products[i].image;
        break;
      }
    }
    for (var i = 0; i < products.length; i++) {
      if (products[i].name && (productName.toLowerCase().includes(products[i].name.toLowerCase()) ||
          products[i].name.toLowerCase().includes(productName.toLowerCase()))) {
        if (products[i].image) return products[i].image;
        break;
      }
    }
  }
  return FALLBACK_IMG;
}

function escapeHtml(str) {
  if (!str) return '';
  return String(str).replace(/[&<>]/g, function(m) {
    return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[m];
  });
}

// ============================================
// RENDER ORDERS
// ============================================
function renderOrders() {
  var filtered = filteredOrders.slice();
  if (searchTerm) {
    filtered = filteredOrders.filter(function(o) {
      return (o.customer_name && o.customer_name.toLowerCase().includes(searchTerm)) ||
             (o.customer_email && o.customer_email.toLowerCase().includes(searchTerm)) ||
             (o.phone && o.phone.includes(searchTerm));
    });
  }

  var container = document.getElementById('ordersContainer');
  if (!filtered.length) {
    container.innerHTML = '<div class="empty-state"><i class="ph ph-clipboard-text"></i><p>No orders found</p></div>';
    return;
  }

  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var o = filtered[i];
    var items = o.items;
    if (typeof items === 'string') {
      try { items = JSON.parse(items); } catch(e) { items = []; }
    }
    if (!items || !items.length) items = [];

    var phoneRaw = o.phone || '';
    var cleanPhone = formatPhone(phoneRaw);
    var displayPhone = formatDisplayPhone(phoneRaw);
    var waLink = cleanPhone ? 'https://wa.me/' + cleanPhone : '#';
    var callLink = cleanPhone ? 'tel:' + cleanPhone : '#';

    var itemsHtml = '';
    for (var j = 0; j < items.length; j++) {
      var item = items[j];
      var productImg = findProductImage(item.product_name || item.name, item.product_id);
      var imgSrc = productImg && productImg.includes('cloudinary.com') ? optimizeImage(productImg, 100) : productImg;
      var itemName = item.product_name || item.name || 'Product';
      var itemQty = item.quantity || item.qty || 1;
      var itemPrice = item.price || 0;
      itemsHtml += '<div class="order-item">' +
        '<img class="order-item-img" src="' + imgSrc + '" onerror="this.src=\'\'" loading="lazy">' +
        '<div class="order-item-details">' +
          '<div class="order-item-name">' + escapeHtml(itemName) + (item.size ? '<span style="font-weight:400;color:var(--muted)">(' + item.size + ')</span>' : '') + '</div>' +
          '<div class="order-item-qty">Qty: ' + itemQty + '</div>' +
        '</div>' +
        '<div class="order-item-price">KES ' + (itemPrice * itemQty).toLocaleString() + '</div>' +
      '</div>';
    }

    var orderId = getOrderDisplayId(o);
    var isProcessing = pendingActions.has(o._id);
    var statusLabel = o.status === 'pending' ? 'Pending' : o.status === 'paid' ? 'Paid' : 'Delivered';
    var statusIcon = o.status === 'pending' ? 'ph-clock' : o.status === 'paid' ? 'ph-check-circle' : 'ph-truck';

    var deliveryFee = o.delivery || 0;
    var subtotal = o.subtotal || (o.total - deliveryFee);
    var deliveryDisplay = deliveryFee === 0 ? '<span style="color:var(--green);">FREE</span>' : 'KES ' + deliveryFee.toLocaleString();

    var actionsHtml = '';
    if (o.status === 'pending') {
      actionsHtml = '<button class="btn btn-sm btn-green" onclick="markPaid(\'' + o._id + '\')" ' + (isProcessing ? 'disabled' : '') + '><i class="ph ph-check-circle"></i> ' + (isProcessing ? '<span class="loading-spinner"></span>' : 'Mark Paid') + '</button>';
    } else if (o.status === 'paid') {
      actionsHtml = '<button class="btn btn-sm btn-gold" onclick="markDelivered(\'' + o._id + '\')" ' + (isProcessing ? 'disabled' : '') + '><i class="ph ph-truck"></i> ' + (isProcessing ? '<span class="loading-spinner"></span>' : 'Mark Delivered') + '</button>';
    } else if (o.status === 'delivered') {
      actionsHtml = '<span class="completed-chip"><i class="ph ph-seal-check"></i> Completed</span>';
    }

    html += '<div class="order-card" data-order-id="' + o._id + '">' +
      '<div class="order-header">' +
        '<div>' +
          '<div class="order-id"><i class="ph ph-package"></i> ' + orderId + '</div>' +
          '<div class="order-customer">' + escapeHtml(o.customer_name || 'Customer') + '</div>' +
          '<div class="order-meta-row">' +
            '<span class="order-meta-chip"><i class="ph ph-envelope"></i> ' + escapeHtml(o.customer_email || 'No email') + '</span>' +
            '<span class="order-meta-chip"><i class="ph ph-calendar"></i> ' + new Date(o.created_at).toLocaleString() + '</span>' +
          '</div>' +
          '<div class="order-meta-row">' +
            '<span class="order-phone-chip"><i class="ph ph-phone"></i> ' + escapeHtml(displayPhone) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="order-header-right">' +
          '<span class="order-status status-' + o.status + '"><i class="ph ' + statusIcon + '"></i> ' + statusLabel + '</span>' +
          '<div class="contact-buttons">' +
            '<a href="' + waLink + '" target="_blank" class="btn btn-sm btn-wa" ' + (!cleanPhone ? 'style="opacity:0.5;pointer-events:none;"' : '') + '><i class="ph ph-whatsapp-logo"></i> WhatsApp</a>' +
            '<a href="' + callLink + '" class="btn btn-sm btn-call" ' + (!cleanPhone ? 'style="opacity:0.5;pointer-events:none;"' : '') + '><i class="ph ph-phone-call"></i> Call</a>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="order-items">' + (itemsHtml || '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No items found</div>') + '</div>' +
      '<div class="order-footer">' +
        '<div>' +
          '<div class="order-total">KES ' + (o.total || 0).toLocaleString() + '</div>' +
          '<div class="order-total-label">Order Total</div>' +
          '<div class="order-meta-small">' +
            '<span><i class="ph ph-package"></i> Subtotal: KES ' + (subtotal || 0).toLocaleString() + '</span>' +
            '<span><i class="ph ph-truck"></i> Delivery: ' + deliveryDisplay + '</span>' +
            '<span><i class="ph ph-credit-card"></i> ' + (o.payment_method || 'Unknown') + '</span>' +
            '<span><i class="ph ph-map-pin"></i> ' + escapeHtml((o.address || '').substring(0, 45)) + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="order-actions">' + actionsHtml + '</div>' +
      '</div>' +
    '</div>';
  }
  container.innerHTML = html;
}

// ============================================
// MARK PAID
// ============================================
async function markPaid(id) {
  if (pendingActions.has(id)) return;

  var orderIndex = -1;
  for (var i = 0; i < filteredOrders.length; i++) {
    if (filteredOrders[i]._id === id) { orderIndex = i; break; }
  }
  if (orderIndex === -1) return;
  var originalOrder = JSON.parse(JSON.stringify(filteredOrders[orderIndex]));

  pendingActions.set(id, 'paid');
  renderOrders();
  renderStats();

  try {
    var res = await fetch(API_BASE + '/api/cashier/orders/' + id + '/status', {
      method: 'PUT',
      headers: getAuthHeaders(),
      body: JSON.stringify({ status: 'paid' })
    });

    if (res.status === 429) {
      showToast('⚠️ Server busy, retrying...', true);
      setTimeout(function() { markPaid(id); }, 3000);
      pendingActions.delete(id);
      renderOrders();
      return;
    }

    if (res.status === 401 || res.status === 403) {
      localStorage.removeItem('liquorbelle_cashier_token');
      localStorage.removeItem('liquorbelle_admin_role');
      adminToken = null;
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      document.getElementById('cashierLoginModal').style.display = 'flex';
      showToast('Session expired. Please login again.', true);
      pendingActions.delete(id);
      var revertIndex = -1;
      for (var i = 0; i < filteredOrders.length; i++) {
        if (filteredOrders[i]._id === id) { revertIndex = i; break; }
      }
      if (revertIndex !== -1) filteredOrders[revertIndex] = originalOrder;
      var allIdx = -1;
      for (var i = 0; i < allOrders.length; i++) {
        if (allOrders[i]._id === id) { allIdx = i; break; }
      }
      if (allIdx !== -1) allOrders[allIdx] = originalOrder;
      renderOrders();
      renderStats();
      return;
    }

    if (res.ok) {
      showToast('✅ Order marked as PAID');
      var updateIndex = -1;
      for (var i = 0; i < filteredOrders.length; i++) {
        if (filteredOrders[i]._id === id) { updateIndex = i; break; }
      }
      if (updateIndex !== -1) filteredOrders[updateIndex].status = 'paid';
      var allUpdateIdx = -1;
      for (var i = 0; i < allOrders.length; i++) {
        if (allOrders[i]._id === id) { allUpdateIdx = i; break; }
      }
      if (allUpdateIdx !== -1) allOrders[allUpdateIdx].status = 'paid';
      pendingActions.delete(id);
      renderOrders();
      renderStats();
      setTimeout(function() { loadOrders(); }, 500);
    } else {
      var revertIndex = -1;
      for (var i = 0; i < filteredOrders.length; i++) {
        if (filteredOrders[i]._id === id) { revertIndex = i; break; }
      }
      if (revertIndex !== -1) filteredOrders[revertIndex] = originalOrder;
      var allIdx = -1;
      for (var i = 0; i < allOrders.length; i++) {
        if (allOrders[i]._id === id) { allIdx = i; break; }
      }
      if (allIdx !== -1) allOrders[allIdx] = originalOrder;
      pendingActions.delete(id);
      renderOrders();
      renderStats();
      showToast('Error updating order', true);
    }
  } catch(e) {
    var revertIndex = -1;
    for (var i = 0; i < filteredOrders.length; i++) {
      if (filteredOrders[i]._id === id) { revertIndex = i; break; }
    }
    if (revertIndex !== -1) filteredOrders[revertIndex] = originalOrder;
    var allIdx = -1;
    for (var i = 0; i < allOrders.length; i++) {
      if (allOrders[i]._id === id) { allIdx = i; break; }
    }
    if (allIdx !== -1) allOrders[allIdx] = originalOrder;
    pendingActions.delete(id);
    renderOrders();
    renderStats();
    showToast('Network error', true);
  }
}

// ============================================
// MARK DELIVERED
// ============================================
async function markDelivered(id) {
  if (pendingActions.has(id)) return;

  var orderIndex = -1;
  for (var i = 0; i < filteredOrders.length; i++) {
    if (filteredOrders[i]._id === id) { orderIndex = i; break; }
  }
  if (orderIndex === -1) return;
  var originalOrder = JSON.parse(JSON.stringify(filteredOrders[orderIndex]));

  pendingActions.set(id, 'delivered');
  renderOrders();
  renderStats();

  try {
    var res = await fetch(API_BASE + '/api/cashier/orders/' + id + '/status', {
      method: 'PUT',
      headers: getAuthHeaders(),
      body: JSON.stringify({ status: 'delivered' })
    });

    if (res.status === 429) {
      showToast('⚠️ Server busy, retrying...', true);
      setTimeout(function() { markDelivered(id); }, 3000);
      pendingActions.delete(id);
      renderOrders();
      return;
    }

    if (res.status === 401 || res.status === 403) {
      localStorage.removeItem('liquorbelle_cashier_token');
      localStorage.removeItem('liquorbelle_admin_role');
      adminToken = null;
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      document.getElementById('cashierLoginModal').style.display = 'flex';
      showToast('Session expired. Please login again.', true);
      pendingActions.delete(id);
      var revertIndex = -1;
      for (var i = 0; i < filteredOrders.length; i++) {
        if (filteredOrders[i]._id === id) { revertIndex = i; break; }
      }
      if (revertIndex !== -1) filteredOrders[revertIndex] = originalOrder;
      var allIdx = -1;
      for (var i = 0; i < allOrders.length; i++) {
        if (allOrders[i]._id === id) { allIdx = i; break; }
      }
      if (allIdx !== -1) allOrders[allIdx] = originalOrder;
      renderOrders();
      renderStats();
      return;
    }

    if (res.ok) {
      showToast('🚚 Order marked as DELIVERED');
      var updateIndex = -1;
      for (var i = 0; i < filteredOrders.length; i++) {
        if (filteredOrders[i]._id === id) { updateIndex = i; break; }
      }
      if (updateIndex !== -1) filteredOrders[updateIndex].status = 'delivered';
      var allUpdateIdx = -1;
      for (var i = 0; i < allOrders.length; i++) {
        if (allOrders[i]._id === id) { allUpdateIdx = i; break; }
      }
      if (allUpdateIdx !== -1) allOrders[allUpdateIdx].status = 'delivered';
      pendingActions.delete(id);
      renderOrders();
      renderStats();
      setTimeout(function() { loadOrders(); }, 500);
    } else {
      var revertIndex = -1;
      for (var i = 0; i < filteredOrders.length; i++) {
        if (filteredOrders[i]._id === id) { revertIndex = i; break; }
      }
      if (revertIndex !== -1) filteredOrders[revertIndex] = originalOrder;
      var allIdx = -1;
      for (var i = 0; i < allOrders.length; i++) {
        if (allOrders[i]._id === id) { allIdx = i; break; }
      }
      if (allIdx !== -1) allOrders[allIdx] = originalOrder;
      pendingActions.delete(id);
      renderOrders();
      renderStats();
      showToast('Error updating order', true);
    }
  } catch(e) {
    var revertIndex = -1;
    for (var i = 0; i < filteredOrders.length; i++) {
      if (filteredOrders[i]._id === id) { revertIndex = i; break; }
    }
    if (revertIndex !== -1) filteredOrders[revertIndex] = originalOrder;
    var allIdx = -1;
    for (var i = 0; i < allOrders.length; i++) {
      if (allOrders[i]._id === id) { allIdx = i; break; }
    }
    if (allIdx !== -1) allOrders[allIdx] = originalOrder;
    pendingActions.delete(id);
    renderOrders();
    renderStats();
    showToast('Network error', true);
  }
}

// ============================================
// SEARCH
// ============================================
function clearSearch() {
  searchTerm = '';
  document.getElementById('orderSearch').value = '';
  renderOrders();
}

// ============================================
// LOGOUT
// ============================================
function logout() {
  localStorage.removeItem('liquorbelle_cashier_token');
  localStorage.removeItem('liquorbelle_admin_role');
  adminToken = null;
  if (autoRefreshInterval) clearInterval(autoRefreshInterval);
  location.reload();
}

// ============================================
// INIT
// ============================================
async function initAfterLogin() {
  await loadProducts();
  await loadOrders();
  if (autoRefreshInterval) clearInterval(autoRefreshInterval);
  autoRefreshInterval = setInterval(function() {
    if (adminToken) loadOrders();
  }, 10000);
}

async function init() {
  adminToken = localStorage.getItem('liquorbelle_cashier_token');
  if (adminToken) {
    document.getElementById('cashierLoginModal').style.display = 'none';
    await initAfterLogin();
  } else {
    document.getElementById('cashierLoginModal').style.display = 'flex';
    setTimeout(function() {
      document.getElementById('cashierPassword').focus();
    }, 300);
  }
}

document.getElementById('orderSearch').addEventListener('input', function(e) {
  searchTerm = e.target.value.toLowerCase();
  renderOrders();
});

init();
</script>
