<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>LiquorBelle — Order Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#800000;
  --primary-light:#9a1c1c;
  --primary-dim:#6b0000;
  --green:#1A6B35;
  --green-light:#22883f;
  --gold:#8a6500;
  --gold-bg:#fdf6e3;
  --white:#FFFFFF;
  --bg:#F8F5F1;
  --bg2:#F0EBE4;
  --bg3:#EAE3DA;
  --border:#DDD5CB;
  --border-light:#EDE8E2;
  --text:#1C1917;
  --text-secondary:#44403C;
  --muted:#78716C;
  --muted-light:#A8A29E;
  --red:#B91C1C;
  --red-bg:#FEF2F2;
  --wa:#25D366;
  --wa-dark:#128C7E;
  --call:#1D4ED8;
  --radius:14px;
  --radius-sm:10px;
  --radius-xs:7px;
  --shadow:0 1px 4px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
  --shadow-md:0 2px 8px rgba(0,0,0,0.08), 0 8px 24px rgba(0,0,0,0.06);
  --font-display:'Inter',sans-serif;
  --font-body:'Inter',sans-serif;
}
body{background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.login-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:2000;}
.login-modal-card{background:var(--white);border-radius:var(--radius);padding:40px 32px;width:90%;max-width:400px;text-align:center;border-top:4px solid var(--primary);}
.login-logo img{width:70px;height:70px;border-radius:12px;margin-bottom:12px;}
.login-logo h2{font-family:var(--font-display);color:var(--primary);margin-bottom:8px;font-size:1.5rem;}
.login-logo p{color:var(--muted);font-size:13px;margin-bottom:24px;}
.password-input-wrapper{position:relative;width:100%;margin-bottom:16px;}
.login-input{width:100%;padding:14px 50px 14px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;background:white;box-sizing:border-box;}
.login-input:focus{outline:none;border-color:var(--primary);}
.password-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;color:var(--muted);font-size:18px;background:none;border:none;padding:0;display:flex;align-items:center;justify-content:center;}
.password-toggle:hover{color:var(--primary);}
.login-btn{width:100%;padding:14px;background:var(--primary);color:white;border:none;border-radius:10px;font-weight:700;font-size:16px;cursor:pointer;}
.login-btn:hover{background:var(--primary-light);}
.login-error{color:var(--red);font-size:13px;margin-top:12px;}
.btn{background:var(--primary);color:white;border:none;padding:9px 18px;border-radius:8px;cursor:pointer;font-weight:600;transition:background 0.15s, box-shadow 0.15s, transform 0.1s;font-size:13.5px;display:inline-flex;align-items:center;gap:7px;letter-spacing:0.01em;line-height:1;}
.btn:hover{background:var(--primary-light);box-shadow:0 2px 8px rgba(128,0,0,0.25);}
.btn:active{transform:scale(0.98);}
.btn-sm{padding:7px 13px;font-size:12.5px;gap:5px;}
.btn-green{background:var(--green);}
.btn-green:hover{background:var(--green-light);box-shadow:0 2px 8px rgba(26,107,53,0.3);}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text-secondary);}
.btn-outline:hover{background:var(--bg2);border-color:var(--border);box-shadow:none;}
.btn-red{background:var(--red);}
.btn-red:hover{background:#991b1b;box-shadow:0 2px 8px rgba(185,28,28,0.3);}
.btn-gold{background:var(--gold);color:white;}
.btn-gold:hover{background:#7a5800;box-shadow:0 2px 8px rgba(138,101,0,0.3);}
.btn-wa{background:var(--wa);color:white;gap:6px;}
.btn-wa:hover{background:var(--wa-dark);box-shadow:0 2px 8px rgba(37,211,102,0.3);}
.btn-call{background:var(--call);color:white;}
.btn-call:hover{background:#1e40af;box-shadow:0 2px 8px rgba(29,78,216,0.3);}
.btn:disabled{opacity:0.55;cursor:not-allowed;box-shadow:none;transform:none;}
.admin-header{background:var(--primary);color:white;padding:0 5%;height:60px;display:flex;justify-content:space-between;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,0.2);}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.logo-img{height:36px;width:auto;border-radius:0;}
.logo-text{font-weight:700;font-size:1rem;letter-spacing:0.02em;white-space:nowrap;}
.logo-divider{width:1px;height:20px;background:rgba(255,255,255,0.25);display:block;}
.header-logout{background:transparent;border:1px solid rgba(255,255,255,0.3);color:rgba(255,255,255,0.85);padding:6px 13px;border-radius:7px;cursor:pointer;font-size:12.5px;font-weight:500;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s;white-space:nowrap;flex-shrink:0;}
.header-logout:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.5);color:white;}
.container{max-width:1380px;margin:0 auto;padding:24px 5%;}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px;}
.stat-card{background:var(--white);border-radius:var(--radius);padding:18px 20px;border:1px solid var(--border-light);box-shadow:var(--shadow);transition:box-shadow 0.2s, transform 0.2s;position:relative;overflow:hidden;}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--primary);opacity:0.7;}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.stat-card h4{font-size:10.5px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;}
.stat-card .value{font-size:26px;font-weight:800;color:var(--text);line-height:1;}
.stat-card .sub{font-size:11px;color:var(--muted);margin-top:5px;}
.search-bar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.search-input-wrap{flex:1;min-width:200px;position:relative;}
.search-input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:16px;pointer-events:none;}
.search-input{width:100%;padding:10px 14px 10px 38px;border:1.5px solid var(--border);border-radius:8px;font-size:13.5px;background:white;transition:border-color 0.15s, box-shadow 0.15s;font-family:inherit;}
.search-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(128,0,0,0.08);}
.filter-bar{display:flex;gap:12px;margin-bottom:18px;flex-wrap:wrap;align-items:center;}
.date-filter-select{padding:10px 16px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);cursor:pointer;}
.status-filter-select{padding:10px 16px;background:var(--white);border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);cursor:pointer;}
.filter-stats{font-size:12px;color:var(--muted);background:var(--bg2);padding:8px 14px;border-radius:8px;}
.clear-btn{background:var(--bg2);border:1.5px solid var(--border);padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:500;font-size:13px;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;color:var(--text-secondary);}
.clear-btn:hover{background:var(--primary);color:white;border-color:var(--primary);}
.refresh-btn{background:var(--primary);color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;font-weight:500;font-size:13px;transition:all 0.15s;display:inline-flex;align-items:center;gap:6px;}
.refresh-btn:hover{background:var(--primary-light);transform:translateY(-1px);}
.help-text{font-size:12px;color:var(--muted);background:var(--bg);padding:8px 12px;border-radius:6px;border-left:3px solid var(--border);line-height:1.5;margin-bottom:14px;}
.help-text i{color:var(--primary);margin-right:4px;}
.orders-list{display:flex;flex-direction:column;gap:16px;}
.order-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border-light);overflow:hidden;box-shadow:var(--shadow);transition:box-shadow 0.2s;}
.order-card:hover{box-shadow:var(--shadow-md);}
.order-header{display:grid;grid-template-columns:1fr auto;gap:16px;padding:14px 18px;background:var(--primary);align-items:start;}
.order-meta-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:8px;}
.order-id{font-family:monospace;font-weight:700;font-size:12px;color:rgba(255,255,255,0.9);background:rgba(0,0,0,0.2);display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:5px;}
.order-customer{font-weight:700;color:white;font-size:15px;margin-top:5px;}
.order-meta-chip{background:rgba(255,255,255,0.15);padding:3px 10px;border-radius:5px;font-size:11.5px;display:inline-flex;align-items:center;gap:5px;color:rgba(255,255,255,0.9);}
.order-meta-chip i{font-size:13px;}
.order-phone-chip{background:rgba(255,255,255,0.15);padding:3px 10px;border-radius:5px;font-size:11.5px;display:inline-flex;align-items:center;gap:5px;color:rgba(255,255,255,0.9);}
.order-header-right{display:flex;flex-direction:column;gap:8px;align-items:flex-end;flex-shrink:0;}
.order-status{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;}
.status-pending{background:#FFF7ED;color:#C2410C;border:1px solid #FED7AA;}
.status-paid{background:#F0FDF4;color:#15803D;border:1px solid #bbf7d0;}
.status-delivered{background:#EFF6FF;color:#1D4ED8;border:1px solid #BFDBFE;}
.contact-buttons{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;}
.contact-buttons a{text-decoration:none;}
.order-items{padding:12px 18px;background:var(--bg);max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;}
.order-item{display:flex;align-items:center;gap:12px;padding:10px 12px;background:white;border-radius:var(--radius-xs);border:1px solid var(--border-light);}
.order-item-img{width:46px;height:46px;object-fit:cover;border-radius:7px;background:var(--bg2);flex-shrink:0;}
.order-item-details{flex:1;min-width:0;}
.order-item-name{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.order-item-qty{font-size:12px;color:var(--muted);margin-top:2px;}
.order-item-price{font-weight:700;color:var(--text);font-size:14px;flex-shrink:0;}
.order-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-top:1px solid var(--border-light);gap:12px;flex-wrap:wrap;background:white;}
.order-total{font-size:19px;font-weight:800;color:var(--text);}
.order-total-label{font-size:11px;color:var(--muted);margin-top:1px;}
.order-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.order-actions .btn{padding:8px 15px;font-size:12.5px;}
.completed-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;color:var(--green);background:#F0FDF4;padding:6px 12px;border-radius:6px;border:1px solid #bbf7d0;}
.order-meta-small{font-size:10.5px;color:var(--muted);margin-top:4px;display:flex;flex-direction:column;gap:3px;}
.order-meta-small span{display:inline-flex;align-items:center;gap:5px;}
.loading-spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-radius:50%;border-top-color:white;animation:spin 0.6s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:white;padding:11px 22px;border-radius:8px;font-size:13.5px;font-weight:500;opacity:0;transition:opacity 0.2s, transform 0.2s;z-index:2000;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,0.18);white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--red);}
.empty-state{text-align:center;padding:56px 24px;color:var(--muted);}
.empty-state i{font-size:40px;display:block;margin-bottom:12px;color:var(--border);}
.empty-state p{font-size:14px;}
@media(max-width:768px){
  .admin-header{padding:0 4%;height:auto;padding-top:10px;padding-bottom:10px;flex-wrap:wrap;gap:10px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .order-header{grid-template-columns:1fr;}
  .order-header-right{align-items:flex-start;flex-direction:row;flex-wrap:wrap;gap:8px;}
  .contact-buttons{justify-content:flex-start;}
  .order-footer{flex-direction:column;align-items:stretch;}
  .order-actions{justify-content:flex-start;}
  .container{padding:16px 4%;}
  .btn-sm{padding:7px 11px;font-size:12px;}
  .order-item{flex-wrap:wrap;}
  .order-item-img{width:40px;height:40px;}
  .search-bar{flex-direction:column;}
  .filter-bar{flex-direction:column;align-items:stretch;}
  .clear-btn,.refresh-btn{justify-content:center;width:100%;}
  .order-meta-small{font-size:9px;}
  .date-filter-select,.status-filter-select{width:100%;}
}
@media(max-width:480px){
  .stats-grid{grid-template-columns:1fr 1fr;}
  .stat-card .value{font-size:22px;}
  .order-actions .btn{flex:1;justify-content:center;}
}
</style>
</head>
<body>

<div id="cashierLoginModal" class="login-modal-overlay">
  <div class="login-modal-card">
    <div class="login-logo">
      <img src="https://res.cloudinary.com/dvqjgbdhp/image/upload/v1780905905/WhatsApp_Image_2026-06-04_at_3.41.50_PM_saprsh.jpg" alt="LiquorBelle">
      <h2>Cashier Login</h2>
      <p>Enter password to access order manager</p>
    </div>
    <form id="cashierLoginForm" onsubmit="event.preventDefault(); submitCashierLogin();">
      <div class="password-input-wrapper">
        <input type="password" id="cashierPassword" class="login-input" placeholder="Enter cashier password" autocomplete="off">
        <button type="button" class="password-toggle" onclick="togglePasswordVisibility()">
          <i class="ph ph-eye" id="togglePasswordIcon"></i>
        </button>
      </div>
      <button type="submit" class="login-btn">Login</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>
</div>

<div class="admin-header">
  <div class="logo">
    <img class="logo-img" src="https://res.cloudinary.com/dvqjgbdhp/image/upload/v1780905905/WhatsApp_Image_2026-06-04_at_3.41.50_PM_saprsh.jpg" alt="LiquorBelle">
    <span class="logo-divider"></span>
    <span class="logo-text">Order Manager</span>
  </div>
  <button class="header-logout" onclick="logout()"><i class="ph ph-sign-out"></i> Logout</button>
</div>

<div class="container">
  <div class="stats-grid" id="statsGrid"></div>
  
  <div class="help-text"><i class="ph ph-info"></i> Manage all orders. Use filters to view by date range or order status. <strong>Mark as Paid</strong> once payment is confirmed, then <strong>Mark Delivered</strong> when order is handed to customer.</div>
  
  <div class="filter-bar">
    <select id="dateFilter" class="date-filter-select" onchange="applyFilters()">
      <option value="all">📅 All Time</option>
      <option value="1">📆 Last 24 Hours</option>
      <option value="7">📆 Last 7 Days</option>
      <option value="30">📆 Last 30 Days</option>
      <option value="90">📆 Last 90 Days</option>
      <option value="365">📅 Last 1 Year</option>
    </select>
    
    <select id="statusFilter" class="status-filter-select" onchange="applyFilters()">
      <option value="all">📋 All Orders</option>
      <option value="pending">⏳ Pending (Need Payment)</option>
      <option value="paid">✅ Paid (Ready to Deliver)</option>
      <option value="delivered">🚚 Delivered (Completed)</option>
    </select>
    
    <span class="filter-stats" id="orderCountDisplay"></span>
  </div>
  
  <div class="search-bar">
    <div class="search-input-wrap">
      <i class="ph ph-magnifying-glass"></i>
      <input type="text" id="orderSearch" class="search-input" placeholder="Search by customer name, email, or phone...">
    </div>
    <button class="clear-btn" onclick="clearSearch()"><i class="ph ph-x"></i> Clear</button>
    <button class="refresh-btn" onclick="manualRefresh()"><i class="ph ph-arrow-clockwise"></i> Refresh</button>
  </div>
  
  <div id="ordersContainer" class="orders-list">
    <div class="empty-state"><i class="ph ph-spinner"></i><p>Loading orders...</p></div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const API_BASE = 'https://liquorbelle-mpesa-backend.onrender.com';
let allOrders = [];
let filteredOrders = [];
let products = [];
let searchTerm = '';
let adminToken = localStorage.getItem('liquorbelle_cashier_token');
let pendingActions = new Map();
let currentDateFilter = 'all';
let currentStatusFilter = 'all';

function togglePasswordVisibility() {
  const passwordInput = document.getElementById('cashierPassword');
  const toggleIcon = document.getElementById('togglePasswordIcon');
  if (passwordInput.type === 'password') {
    passwordInput.type = 'text';
    toggleIcon.setAttribute('class', 'ph ph-eye-slash');
  } else {
    passwordInput.type = 'password';
    toggleIcon.setAttribute('class', 'ph ph-eye');
  }
}

function applyFilters() {
  currentDateFilter = document.getElementById('dateFilter').value;
  currentStatusFilter = document.getElementById('statusFilter').value;
  
  let result = [...allOrders];
  
  if (currentDateFilter !== 'all') {
    const daysAgo = new Date(Date.now() - parseInt(currentDateFilter) * 24 * 60 * 60 * 1000);
    result = result.filter(o => new Date(o.created_at) >= daysAgo);
  }
  
  if (currentStatusFilter !== 'all') {
    result = result.filter(o => o.status === currentStatusFilter);
  }
  
  filteredOrders = result;
  
  renderStats();
  renderOrders();
}

function showToast(msg, isError = false){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.toggle('error', isError);
  t.classList.add('show');
  clearTimeout(t._timeout);
  t._timeout = setTimeout(() => {
    t.classList.remove('show','error');
  }, 3200);
}

function formatPhone(phone){
  if(!phone) return '';
  let clean = phone.replace(/\D/g, '');
  if(clean.startsWith('0')) clean = '254' + clean.slice(1);
  if(!clean.startsWith('254')) clean = '254' + clean;
  return clean;
}

function formatDisplayPhone(phone){
  if(!phone) return 'No phone';
  const display = phone.toString();
  if(display.length === 12 && display.startsWith('254')) return '0' + display.slice(3);
  if(display.length === 10 && (display.startsWith('07') || display.startsWith('01'))) return display;
  return display;
}

function getAuthHeaders() {
  return {
    'Content-Type': 'application/json',
    'Authorization': `Bearer ${adminToken}`
  };
}

async function adminLogin(password) {
  try {
    const res = await fetch(`${API_BASE}/api/admin/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await res.json();
    if (data.success && data.token) {
      adminToken = data.token;
      localStorage.setItem('liquorbelle_cashier_token', adminToken);
      localStorage.setItem('liquorbelle_admin_role', data.role);
      return true;
    }
    return false;
  } catch(e) {
    return false;
  }
}

function submitCashierLogin() {
  const password = document.getElementById('cashierPassword').value;
  const errorDiv = document.getElementById('loginError');
  errorDiv.innerText = '';
  
  adminLogin(password).then(success => {
    if(success) {
      document.getElementById('cashierLoginModal').style.display = 'none';
      initAfterLogin();
    } else {
      errorDiv.innerText = 'Invalid password. Try again.';
      document.getElementById('cashierPassword').value = '';
    }
  });
}

async function loadProducts(){
  try{
    const res = await fetch(`${API_BASE}/api/db/products`);
    const data = await res.json();
    if(data.success) products = data.products;
  } catch(e){ products = []; }
}

async function loadOrders(){
  if(!adminToken) {
    showToast('Please login first', true);
    return;
  }
  try{
    const res = await fetch(`${API_BASE}/api/admin/all-orders?limit=1000`, {
      headers: getAuthHeaders()
    });
    
    if(res.status === 401 || res.status === 403){
      showToast('Session expired. Please login again.', true);
      logout();
      return;
    }
    if(res.status === 429){
      showToast('⚠️ Too many requests. Please wait...', true);
      return;
    }
    const data = await res.json();
    if(data.success) {
      allOrders = data.orders.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));
      applyFilters();
    } else {
      allOrders = [];
      filteredOrders = [];
      renderStats();
      renderOrders();
    }
  } catch(e){ 
    console.error('Error loading orders:', e);
    allOrders = []; 
    filteredOrders = [];
    renderStats();
    renderOrders();
  }
}

function manualRefresh(){
  showToast('Refreshing orders...');
  loadOrders();
}

function renderStats(){
  const total = filteredOrders.length;
  const pending = filteredOrders.filter(o => o.status === 'pending').length;
  const paid = filteredOrders.filter(o => o.status === 'paid').length;
  const delivered = filteredOrders.filter(o => o.status === 'delivered').length;
  
  let periodText = '';
  if (currentDateFilter === 'all') periodText = 'All Time';
  else if (currentDateFilter === '1') periodText = 'Last 24 Hours';
  else if (currentDateFilter === '7') periodText = 'Last 7 Days';
  else if (currentDateFilter === '30') periodText = 'Last 30 Days';
  else if (currentDateFilter === '90') periodText = 'Last 90 Days';
  else if (currentDateFilter === '365') periodText = 'Last Year';
  
  let statusText = '';
  if (currentStatusFilter === 'all') statusText = 'All Orders';
  else if (currentStatusFilter === 'pending') statusText = 'Pending Orders';
  else if (currentStatusFilter === 'paid') statusText = 'Paid Orders';
  else if (currentStatusFilter === 'delivered') statusText = 'Delivered Orders';
  
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><h4>📊 ${statusText}</h4><div class="value">${total}</div><div class="sub">${periodText}</div></div>
    <div class="stat-card"><h4>⏳ Pending</h4><div class="value">${pending}</div><div class="sub">Need payment</div></div>
    <div class="stat-card"><h4>✅ Paid</h4><div class="value">${paid}</div><div class="sub">Ready to deliver</div></div>
    <div class="stat-card"><h4>🚚 Delivered</h4><div class="value">${delivered}</div><div class="sub">Completed</div></div>
  `;
  document.getElementById('orderCountDisplay').innerHTML = `📋 ${total} order${total !== 1 ? 's' : ''} found`;
}

function getOrderDisplayId(order){
  if(order.order_number) return order.order_number;
  if(order._id){
    const idStr = order._id.toString();
    return idStr.slice(-8).toUpperCase();
  }
  return 'N/A';
}

function findProductImage(productName, productId){
  if(!productName && !productId) return 'https://placehold.co/46x46/F2EDE7/800000?text=🍾';
  
  if(productId) {
    const product = products.find(p => p._id === productId);
    if(product && product.image) return product.image;
  }
  
  if(productName) {
    let product = products.find(p => p.name && p.name.toLowerCase() === productName.toLowerCase());
    if(product && product.image) return product.image;
    
    product = products.find(p => p.name && productName.toLowerCase().includes(p.name.toLowerCase()) || p.name.toLowerCase().includes(productName.toLowerCase()));
    if(product && product.image) return product.image;
  }
  
  return 'https://placehold.co/46x46/F2EDE7/800000?text=🍾';
}

function renderOrders(){
  let filtered = [...filteredOrders];
  if(searchTerm){
    filtered = filteredOrders.filter(o => 
      o.customer_name?.toLowerCase().includes(searchTerm) ||
      o.customer_email?.toLowerCase().includes(searchTerm) ||
      o.phone?.includes(searchTerm)
    );
  }
  
  const container = document.getElementById('ordersContainer');
  if(!filtered.length){
    container.innerHTML = '<div class="empty-state"><i class="ph ph-clipboard-text"></i><p>No orders found</p></div>';
    return;
  }
  
  container.innerHTML = filtered.map(o => {
    let items = o.items;
    if(typeof items === 'string'){ try{ items = JSON.parse(items); }catch(e){ items = []; } }
    if(!items || !items.length) items = [];
    
    const phoneRaw = o.phone || '';
    const cleanPhone = formatPhone(phoneRaw);
    const displayPhone = formatDisplayPhone(phoneRaw);
    const waLink = cleanPhone ? `https://wa.me/${cleanPhone}` : '#';
    const callLink = cleanPhone ? `tel:${cleanPhone}` : '#';
    
    const itemsHtml = items.map(i => {
      const productImg = findProductImage(i.product_name || i.name, i.product_id);
      return `
        <div class="order-item">
          <img class="order-item-img" src="${productImg}" onerror="this.src='https://placehold.co/46x46/F2EDE7/800000?text=🍾'" loading="lazy">
          <div class="order-item-details">
            <div class="order-item-name">${escapeHtml(i.product_name || i.name)} ${i.size ? `<span style="font-weight:400;color:var(--muted)">(${i.size})</span>` : ''}</div>
            <div class="order-item-qty">Qty: ${i.quantity || i.qty || 1}</div>
          </div>
          <div class="order-item-price">KES ${((i.price||0) * (i.quantity||i.qty||1)).toLocaleString()}</div>
        </div>
      `;
    }).join('');
    
    const orderId = getOrderDisplayId(o);
    const isProcessing = pendingActions.has(o._id);
    const statusLabel = o.status === 'pending' ? 'Pending' : o.status === 'paid' ? 'Paid' : 'Delivered';
    const statusIcon = o.status === 'pending' ? 'ph-clock' : o.status === 'paid' ? 'ph-check-circle' : 'ph-truck';
    
    const deliveryFee = o.delivery || 0;
    const subtotal = o.subtotal || (o.total - deliveryFee);
    const deliveryDisplay = deliveryFee === 0 ? '<span style="color:var(--green);">FREE</span>' : `KES ${deliveryFee.toLocaleString()}`;
    
    return `
      <div class="order-card" data-order-id="${o._id}">
        <div class="order-header">
          <div>
            <div class="order-id"><i class="ph ph-package"></i> ${orderId}</div>
            <div class="order-customer">${escapeHtml(o.customer_name || 'Customer')}</div>
            <div class="order-meta-row">
              <span class="order-meta-chip"><i class="ph ph-envelope"></i> ${escapeHtml(o.customer_email || 'No email')}</span>
              <span class="order-meta-chip"><i class="ph ph-calendar"></i> ${new Date(o.created_at).toLocaleString()}</span>
            </div>
            <div class="order-meta-row">
              <span class="order-phone-chip"><i class="ph ph-phone"></i> ${escapeHtml(displayPhone)}</span>
            </div>
          </div>
          <div class="order-header-right">
            <span class="order-status status-${o.status}"><i class="ph ${statusIcon}"></i> ${statusLabel}</span>
            <div class="contact-buttons">
              <a href="${waLink}" target="_blank" class="btn btn-sm btn-wa" ${!cleanPhone ? 'style="opacity:0.5;pointer-events:none;"' : ''}><i class="ph ph-whatsapp-logo"></i> WhatsApp</a>
              <a href="${callLink}" class="btn btn-sm btn-call" ${!cleanPhone ? 'style="opacity:0.5;pointer-events:none;"' : ''}><i class="ph ph-phone-call"></i> Call</a>
            </div>
          </div>
        </div>
        <div class="order-items">${itemsHtml || '<div style="color:var(--muted);font-size:13px;padding:8px 0;">No items found</div>'}</div>
        <div class="order-footer">
          <div>
            <div class="order-total">KES ${(o.total || 0).toLocaleString()}</div>
            <div class="order-total-label">Order Total</div>
            <div class="order-meta-small">
              <span><i class="ph ph-package"></i> Subtotal: KES ${(subtotal || 0).toLocaleString()}</span>
              <span><i class="ph ph-truck"></i> Delivery: ${deliveryDisplay}</span>
              <span><i class="ph ph-credit-card"></i> ${o.payment_method || 'Unknown'}</span>
              <span><i class="ph ph-map-pin"></i> ${escapeHtml((o.address || '').substring(0, 45))}</span>
            </div>
          </div>
          <div class="order-actions">
            ${o.status === 'pending' ? `<button class="btn btn-sm btn-green" onclick="markPaid('${o._id}')" ${isProcessing ? 'disabled' : ''}><i class="ph ph-check-circle"></i> ${isProcessing ? '<span class="loading-spinner"></span>' : 'Mark Paid'}</button>` : ''}
            ${o.status === 'paid' ? `<button class="btn btn-sm btn-gold" onclick="markDelivered('${o._id}')" ${isProcessing ? 'disabled' : ''}><i class="ph ph-truck"></i> ${isProcessing ? '<span class="loading-spinner"></span>' : 'Mark Delivered'}</button>` : ''}
            ${o.status === 'delivered' ? `<span class="completed-chip"><i class="ph ph-seal-check"></i> Completed</span>` : ''}
          </div>
        </div>
      </div>
    `;
  }).join('');
}

async function markPaid(id){
  if(!adminToken) { showToast('Please login again', true); logout(); return; }
  if(pendingActions.has(id)) return;
  
  const orderIndex = filteredOrders.findIndex(o => o._id === id);
  if(orderIndex === -1) return;
  const originalOrder = { ...filteredOrders[orderIndex] };
  
  pendingActions.set(id, 'paid');
  filteredOrders[orderIndex].status = 'paid';
  const allIdx = allOrders.findIndex(o => o._id === id);
  if(allIdx !== -1) allOrders[allIdx].status = 'paid';
  renderOrders();
  renderStats();
  
  try{
    const res = await fetch(`${API_BASE}/api/db/orders/${id}/status`, {
      method: 'PUT',
      headers: getAuthHeaders(),
      body: JSON.stringify({ status: 'paid' })
    });
    
    if(res.status === 429){
      showToast('⚠️ Server busy, retrying...', true);
      setTimeout(() => markPaid(id), 3000);
      return;
    }
    
    if(res.status === 401 || res.status === 403){
      showToast('Session expired. Please login again.', true);
      logout();
      return;
    }
    
    if(res.ok){
      showToast('✅ Order marked as PAID');
      await loadOrders();
    } else {
      filteredOrders[orderIndex] = originalOrder;
      if(allIdx !== -1) allOrders[allIdx] = originalOrder;
      renderOrders();
      renderStats();
      showToast('Error updating order', true);
    }
  } catch(e){
    filteredOrders[orderIndex] = originalOrder;
    if(allIdx !== -1) allOrders[allIdx] = originalOrder;
    renderOrders();
    renderStats();
    showToast('Network error', true);
  } finally {
    pendingActions.delete(id);
  }
}

async function markDelivered(id){
  if(!adminToken) { showToast('Please login again', true); logout(); return; }
  if(pendingActions.has(id)) return;
  
  const orderIndex = filteredOrders.findIndex(o => o._id === id);
  if(orderIndex === -1) return;
  const originalOrder = { ...filteredOrders[orderIndex] };
  
  pendingActions.set(id, 'delivered');
  filteredOrders[orderIndex].status = 'delivered';
  const allIdx = allOrders.findIndex(o => o._id === id);
  if(allIdx !== -1) allOrders[allIdx].status = 'delivered';
  renderOrders();
  renderStats();
  
  try{
    const res = await fetch(`${API_BASE}/api/db/orders/${id}/status`, {
      method: 'PUT',
      headers: getAuthHeaders(),
      body: JSON.stringify({ status: 'delivered' })
    });
    
    if(res.status === 429){
      showToast('⚠️ Server busy, retrying...', true);
      setTimeout(() => markDelivered(id), 3000);
      return;
    }
    
    if(res.status === 401 || res.status === 403){
      showToast('Session expired. Please login again.', true);
      logout();
      return;
    }
    
    if(res.ok){
      showToast('🚚 Order marked as DELIVERED');
      await loadOrders();
    } else {
      filteredOrders[orderIndex] = originalOrder;
      if(allIdx !== -1) allOrders[allIdx] = originalOrder;
      renderOrders();
      renderStats();
      showToast('Error updating order', true);
    }
  } catch(e){
    filteredOrders[orderIndex] = originalOrder;
    if(allIdx !== -1) allOrders[allIdx] = originalOrder;
    renderOrders();
    renderStats();
    showToast('Network error', true);
  } finally {
    pendingActions.delete(id);
  }
}

function clearSearch(){
  searchTerm = '';
  document.getElementById('orderSearch').value = '';
  renderOrders();
}

function escapeHtml(str){ 
  if(!str) return '';
  return String(str).replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); 
}

function logout(){
  localStorage.removeItem('liquorbelle_cashier_token');
  localStorage.removeItem('liquorbelle_admin_role');
  adminToken = null;
  location.reload();
}

async function initAfterLogin() {
  await loadProducts();
  await loadOrders();
  setInterval(loadOrders, 120000);
}

async function init() {
  adminToken = localStorage.getItem('liquorbelle_cashier_token');
  if(adminToken) {
    document.getElementById('cashierLoginModal').style.display = 'none';
    await initAfterLogin();
  } else {
    document.getElementById('cashierLoginModal').style.display = 'flex';
  }
}

document.getElementById('orderSearch').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase();
  renderOrders();
});

init();
</script>
