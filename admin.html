<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Admin — LiquorBelle | Manage Products & Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0A0A0A;
  --s1:#111;
  --s2:#1A1A1A;
  --s3:#222;
  --gold:#D4AF37;
  --red:#c0392b;
  --green:#1a7a2a;
  --text:#fff;
  --muted:#666;
  --border:#1e1e1e;
  --radius:14px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}

/* LOGIN SCREEN */
.login-screen{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;z-index:1000;
}
.login-panel{
  width:360px;padding:40px 32px;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:24px;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}
.logo-img{height:42px;border-radius:8px;margin-bottom:16px;}
.login-panel h2{font-weight:700;margin-bottom:24px;color:var(--gold);}
.lp-field{margin-bottom:14px;}
.lp-input{
  width:100%;padding:12px 16px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:40px;color:var(--text);
  font-size:14px;outline:none;
}
.lp-btn{
  width:100%;padding:12px;
  background:var(--gold);color:#000;
  border:none;border-radius:40px;
  font-weight:700;cursor:pointer;
  margin-top:12px;
}
.lp-err{color:#e55;font-size:12px;margin-top:10px;display:none;}

/* HEADER */
header{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 5%;background:var(--s1);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-img{height:38px;}
.logo-name{font-weight:800;font-size:20px;}
.logo-name em{color:var(--gold);font-style:normal;}
.admin-tag{background:rgba(212,175,55,0.15);padding:6px 14px;border-radius:40px;font-size:12px;font-weight:600;color:var(--gold);}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:40px;cursor:pointer;}

/* TABS */
.tabs{
  display:flex;gap:4px;padding:16px 5% 0;background:var(--s1);border-bottom:1px solid var(--border);
}
.tab{
  padding:12px 24px;background:transparent;border:none;color:var(--muted);
  cursor:pointer;font-weight:600;font-size:14px;border-bottom:2px solid transparent;
  transition:all 0.2s;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* MAIN CONTAINER */
.main-container{padding:24px 5%;max-width:1400px;margin:0 auto;}

/* STATS */
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;margin-bottom:32px;
}
.stat-card{
  background:var(--s1);padding:20px;border-radius:var(--radius);
  border:1px solid var(--border);
}
.stat-card h4{font-size:12px;color:var(--muted);margin-bottom:8px;}
.stat-card .value{font-size:32px;font-weight:800;color:var(--gold);}

/* PRODUCT TABLE */
.product-table{
  background:var(--s1);border-radius:var(--radius);
  border:1px solid var(--border);overflow-x:auto;
}
.table-header{
  display:grid;grid-template-columns:60px 1fr 1fr 100px 100px 80px;
  background:var(--s2);padding:12px 16px;font-weight:600;font-size:13px;
  border-bottom:1px solid var(--border);
}
.product-row{
  display:grid;grid-template-columns:60px 1fr 1fr 100px 100px 80px;
  padding:12px 16px;align-items:center;border-bottom:1px solid var(--border);
  font-size:13px;
}
.product-row:hover{background:rgba(255,255,255,0.02);}
.product-img{width:40px;height:40px;object-fit:cover;border-radius:8px;background:#222;}
.product-actions{display:flex;gap:8px;}
.edit-btn,.delete-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:6px;}
.edit-btn:hover{color:var(--gold);background:rgba(212,175,55,0.1);}
.delete-btn:hover{color:#e55;background:rgba(229,85,85,0.1);}

/* ADD PRODUCT FORM */
.add-product-form{
  background:var(--s1);border-radius:var(--radius);
  border:1px solid var(--border);padding:24px;margin-bottom:32px;
}
.add-product-form h3{font-size:18px;margin-bottom:16px;color:var(--gold);}
.form-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:16px;margin-bottom:16px;
}
.form-grid input, .form-grid select{
  background:var(--s2);border:1px solid var(--border);
  padding:12px;border-radius:40px;color:var(--text);
  font-size:13px;outline:none;
}
.form-grid input:focus{border-color:var(--gold);}
.submit-btn{
  background:var(--gold);color:#000;border:none;
  padding:12px 24px;border-radius:40px;font-weight:700;
  cursor:pointer;margin-top:8px;
}

/* ORDERS SECTION */
.orders-list{display:flex;flex-direction:column;gap:16px;}
.order-card{
  background:var(--s1);border-radius:var(--radius);
  border:1px solid var(--border);overflow:hidden;
}
.order-header{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;background:var(--s2);border-bottom:1px solid var(--border);
}
.order-id{font-weight:700;font-family:monospace;}
.order-status{
  padding:4px 12px;border-radius:40px;font-size:11px;font-weight:700;
}
.order-status.pending{background:rgba(212,175,55,0.15);color:var(--gold);}
.order-status.delivered{background:rgba(26,122,42,0.15);color:#4ade80;}
.order-items{padding:16px 20px;}
.order-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.order-footer{
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 20px;border-top:1px solid var(--border);
}
.order-total{font-size:22px;font-weight:800;color:var(--gold);}
.order-actions{display:flex;gap:8px;}
.order-btn{
  padding:8px 16px;border-radius:40px;font-weight:600;
  font-size:12px;cursor:pointer;border:none;
}
.btn-done{background:var(--green);color:#fff;}
.btn-del{background:transparent;border:1px solid var(--border);color:var(--muted);}

/* MODAL */
.modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.8);z-index:200;
  justify-content:center;align-items:center;
}
.modal-content{
  background:var(--s1);border-radius:24px;padding:28px;
  width:90%;max-width:500px;border:1px solid var(--gold);
}
.modal-content h3{margin-bottom:20px;}
.modal-content input, .modal-content select{
  width:100%;padding:12px;margin-bottom:12px;
  background:var(--s2);border:1px solid var(--border);
  border-radius:40px;color:var(--text);
}
.modal-buttons{display:flex;gap:12px;margin-top:20px;}
.modal-buttons button{flex:1;padding:12px;border-radius:40px;cursor:pointer;}
.save-btn{background:var(--gold);color:#000;border:none;}
.cancel-btn{background:transparent;border:1px solid var(--border);color:var(--text);}

.empty-state{text-align:center;padding:60px;color:var(--muted);}

.snack{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--s2);border:1px solid var(--gold);
  padding:10px 24px;border-radius:40px;font-size:13px;
  opacity:0;transition:opacity 0.2s;z-index:300;
}
.snack.on{opacity:1;}

@media(max-width:768px){
  .table-header,.product-row{grid-template-columns:50px 1fr 80px 70px 60px;}
  .product-row .product-category{display:none;}
  .table-header .category{display:none;}
}
</style>
</head>

</div>

    <button class="tab" data-tab="orders">📋 Orders</button>
  </div>

    <!-- PRODUCTS TAB -->

          <input type="text" id="prodSub" placeholder="Description (e.g. Scotch Whisky 750ml)">
          <input type="number" id="prodPrice" placeholder="Price (KES)">
          <select id="prodCategory">
            <option value="whisky">Whisky</option><option value="vodka">Vodka</option>
            <option value="wine">Wine</option><option value="beer">Beer</option>
            <option value="rum">Rum</option><option value="gin">Gin</option>
            <option value="cognac">Cognac/Brandy</option><option value="champagne">Champagne</option>
            <option value="kenyan">Kenyan Spirits</option>
          </select>
          <select id="prodBadge">
            <option value="">No Badge</option><option value="hot">🔥 Best Seller</option>
            <option value="prem">⭐ Premium</option><option value="local">🇰🇪 Kenyan Brand</option>
          </select>
          <input type="text" id="prodImage" placeholder="Image URL (optional)">
          <input type="number" id="prodStock" placeholder="Stock qty (optional — leave blank = unlimited)">
        </div>
        <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
          <button class="submit-btn" onclick="addProduct()"><i class="ph ph-floppy-disk"></i> Save Product</button>
          <span style="font-size:12px;color:#4ade80;">● Products save instantly to the shop</span>
        </div>
      </div>

      <div class="product-table">
        <div class="table-header">
          <div>Image</div><div>Name</div><div class="category">Category</div><div>Price</div><div>Stock</div><div>Actions</div>
        </div>
        <div id="productsList"></div>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="ordersTab" style="display:none;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div class="stats-grid" id="orderStats" style="flex:1;margin:0;"></div>
        <button onclick="refreshOrders()" style="background:rgba(212,175,55,0.15);border:1px solid var(--gold);color:var(--gold);padding:10px 18px;border-radius:40px;cursor:pointer;font-weight:600;font-size:13px;white-space:nowrap;margin-left:16px;"><i class="ph ph-arrows-clockwise"></i> Refresh</button>
      </div>
      <div id="ordersList" class="orders-list"></div>
    </div>
  </div>
</div>

<div class="snack" id="snack"></div>

<!-- Edit Modal -->
<div id="editModal" class="modal">

    <h3>Edit Product</h3>

    <input type="number" id="editPrice" placeholder="Price">
    <select id="editCategory">
      <option value="whisky">Whisky</option><option value="vodka">Vodka</option>
      <option value="wine">Wine</option><option value="beer">Beer</option>
      <option value="rum">Rum</option><option value="gin">Gin</option>
      <option value="cognac">Cognac/Brandy</option><option value="champagne">Champagne</option>

      <option value="">No Badge</option><option value="hot">🔥 Best Seller</option>

    <input type="number" id="editStock" placeholder="Stock qty (leave blank = unlimited)">
    <div class="modal-buttons">
      <button class="save-btn" onclick="saveEdit()">Save Changes</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

// Load or initialize products from localStorage
let products = JSON.parse(localStorage.getItem('liquorbelle_products'));
if(!products || products.length === 0){
  products = FULL_PRODUCT_LIST;
  localStorage.setItem('liquorbelle_products', JSON.stringify(products));
}
let orders = JSON.parse(localStorage.getItem('liquorbelle_admin_orders') || '[]');
let auth = sessionStorage.getItem('liquorbelle_admin') === 'true';

function saveProducts(){ localStorage.setItem('liquorbelle_products', JSON.stringify(products)); }
function saveOrders(){ localStorage.setItem('liquorbelle_admin_orders', JSON.stringify(orders)); }
function toast(msg){ const t=document.getElementById('snack'); t.innerText=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2500); }

// Login
function login(){
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  if((u === 'admin' || u === 'liquorbelle') && p === 'admin123'){
    sessionStorage.setItem('liquorbelle_admin', 'true');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    auth = true;
    renderAll();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout(){
  sessionStorage.removeItem('liquorbelle_admin');
  location.reload();
}

function renderAll(){
  if(!auth) return;
  renderProducts();
  renderOrders();
  renderProductStats();
  renderOrderStats();
  document.querySelector('.tab[data-tab="products"]').innerHTML = `📦 Products (${products.length})`;
}

function renderProducts(){
  const container = document.getElementById('productsList');
  if(products.length === 0){
    container.innerHTML = '<div class="empty-state"><i class="ph ph-package"></i><p>No products. Add your first product above.</p></div>';
    return;
  }
  container.innerHTML = products.map(p => {
    const stockDisplay = p.stock == null ? '<span style="color:#555;font-size:11px;">Unlimited</span>' :
      p.stock === 0 ? '<span style="color:#e55;font-weight:700;">Out of Stock</span>' :
      p.stock <= 5 ? `<span style="color:#e67e22;font-weight:700;">${p.stock} left</span>` :
      `<span style="color:#4ade80;font-weight:600;">${p.stock}</span>`;
    return `
    <div class="product-row">
      <div><img class="product-img" src="${p.image || 'https://i.postimg.cc/DzB8Bvmx/glass-whiskey-with-ice-bottle-with-label-vector-hand-drawn-color-illustration-168440-913.avif'}" onerror="this.src='https://i.postimg.cc/DzB8Bvmx/glass-whiskey-with-ice-bottle-with-label-vector-hand-drawn-color-illustration-168440-913.avif'"></div>
      <div><strong>${escapeHtml(p.name)}</strong><br><span style="font-size:11px;color:#888;">${escapeHtml(p.sub || '')}</span></div>
      <div class="category"><span style="font-size:11px;background:rgba(212,175,55,0.15);padding:2px 8px;border-radius:20px;">${p.category}</span></div>
      <div style="color:var(--gold);font-weight:700;">KES ${p.price.toLocaleString()}</div>
      <div>${stockDisplay}</div>
      <div class="product-actions">
        <button class="edit-btn" onclick="openEditModal(${p.id})" title="Edit"><i class="ph ph-pencil-simple"></i></button>
        <button class="delete-btn" onclick="deleteProduct(${p.id})" title="Delete"><i class="ph ph-trash"></i></button>
      </div>
    </div>
  `}).join('');
}

function renderProductStats(){
  const totalValue = products.reduce((s,p) => s + p.price, 0);
  const avgPrice = Math.round(totalValue / products.length);
  document.getElementById('productStats').innerHTML = `
    <div class="stat-card"><h4>Total Products</h4><div class="value">${products.length}</div></div>
    <div class="stat-card"><h4>Categories</h4><div class="value">${new Set(products.map(p=>p.category)).size}</div></div>
    <div class="stat-card"><h4>Avg Price</h4><div class="value">KES ${avgPrice.toLocaleString()}</div></div>
    <div class="stat-card"><h4>Total Value</h4><div class="value">KES ${totalValue.toLocaleString()}</div></div>
  `;
}

function addProduct(){
  const name = document.getElementById('prodName').value.trim();
  const sub = document.getElementById('prodSub').value.trim();
  const price = parseFloat(document.getElementById('prodPrice').value);
  const category = document.getElementById('prodCategory').value;
  const badge = document.getElementById('prodBadge').value;
  const image = document.getElementById('prodImage').value.trim();
  const stockVal = document.getElementById('prodStock').value.trim();
  const stock = stockVal === '' ? null : parseInt(stockVal);

  if(!name || !price || isNaN(price)){
    toast('Please fill product name and price');
    return;
  }
  const newId = products.length > 0 ? Math.max(...products.map(p=>p.id)) + 1 : 83;
  products.push({
    id: newId, name, sub: sub || `${category} 750ml`, price,
    category, badge, image, stock
  });
  saveProducts();
  renderProducts();
  renderProductStats();
  document.getElementById('prodName').value = '';
  document.getElementById('prodSub').value = '';
  document.getElementById('prodPrice').value = '';
  document.getElementById('prodImage').value = '';
  document.getElementById('prodStock').value = '';
  toast('✓ Product added — now live on shop');
}

function deleteProduct(id){
  if(confirm('Delete this product permanently?')){
    products = products.filter(p => p.id !== id);
    saveProducts();
    renderProducts();
    renderProductStats();
    toast('Product deleted');
  }
}

let editingId = null;
function openEditModal(id){
  const p = products.find(p => p.id === id);
  if(!p) return;
  editingId = id;
  document.getElementById('editName').value = p.name;
  document.getElementById('editSub').value = p.sub || '';
  document.getElementById('editPrice').value = p.price;
  document.getElementById('editCategory').value = p.category;
  document.getElementById('editBadge').value = p.badge || '';
  document.getElementById('editImage').value = p.image || '';
  document.getElementById('editStock').value = p.stock != null ? p.stock : '';
  document.getElementById('editModal').style.display = 'flex';
}
function closeModal(){ document.getElementById('editModal').style.display = 'none'; editingId = null; }
function saveEdit(){
  if(!editingId) return;
  const index = products.findIndex(p => p.id === editingId);
  if(index !== -1){
    const stockVal = document.getElementById('editStock').value.trim();
    products[index].name = document.getElementById('editName').value.trim();
    products[index].sub = document.getElementById('editSub').value.trim();
    products[index].price = parseFloat(document.getElementById('editPrice').value);
    products[index].category = document.getElementById('editCategory').value;
    products[index].badge = document.getElementById('editBadge').value;
    products[index].image = document.getElementById('editImage').value.trim();
    products[index].stock = stockVal === '' ? null : parseInt(stockVal);
    saveProducts();
    renderProducts();
    renderProductStats();
    toast('✓ Product updated — changes live on shop');
    closeModal();
  }
}

// ORDERS

    return;
  }
  container.innerHTML = [...pending, ...completed].map(o => `
    <div class="order-card">
      <div class="order-header">
        <div>
          <span class="order-id">${o.id}</span>
          <br><span style="font-size:12px;color:#aaa;font-weight:600;">${o.customer || 'Customer'}</span>
          ${o.address ? `<br><span style="font-size:11px;color:#666;"><i class="ph ph-map-pin"></i> ${escapeHtml(o.address)}</span>` : ''}
          <br><span style="font-size:11px;color:#888;">${o.time || (o.date ? new Date(o.date).toLocaleString() : '')}</span>
        </div>
        <div style="text-align:right;">
          <span class="order-status ${o.status}">${o.status === 'pending' ? '⏳ Pending' : '✅ Delivered'}</span>
        </div>
      </div>
      <div class="order-items">
        ${o.items.map(i => `<div class="order-item"><span>${escapeHtml(i.name)} × ${i.qty}</span><span>KES ${(i.price * i.qty).toLocaleString()}</span></div>`).join('')}
      </div>
      <div class="order-footer">
        <div class="order-total">KES ${o.total.toLocaleString()}</div>
        <div class="order-actions">
          ${o.status === 'pending' ? `<button class="order-btn btn-done" onclick="markOrderDelivered('${o.id}')"><i class="ph ph-check"></i> Mark Delivered</button>` : ''}

        </div>
      </div>
    </div>
  `).join('');
}

function renderOrderStats(){
  const pending = orders.filter(o => o.status === 'pending').length;
  const total = orders.length;
  const revenue = orders.filter(o => o.status === 'delivered').reduce((s,o) => s + o.total, 0);
  document.getElementById('orderStats').innerHTML = `
    <div class="stat-card"><h4>Total Orders</h4><div class="value">${total}</div></div>
    <div class="stat-card"><h4>Pending</h4><div class="value">${pending}</div></div>
    <div class="stat-card"><h4>Revenue</h4><div class="value">KES ${revenue.toLocaleString()}</div></div>
  `;
}

function markOrderDelivered(id){
  const order = orders.find(o => o.id === id);
  if(order){ order.status = 'delivered'; saveOrders(); renderOrders(); renderOrderStats(); toast('Order marked as delivered'); }
}
function deleteOrder(id){
  if(confirm('Delete this order?')){ orders = orders.filter(o => o.id !== id); saveOrders(); renderOrders(); renderOrderStats(); toast('Order deleted'); }
}

function refreshOrders(){
  orders = JSON.parse(localStorage.getItem('liquorbelle_admin_orders') || '[]');
  renderOrders();
  renderOrderStats();
  toast('Orders refreshed');
}

// Tab switching
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const tabName = tab.dataset.tab;
    document.getElementById('productsTab').style.display = tabName === 'products' ? 'block' : 'none';
    document.getElementById('ordersTab').style.display = tabName === 'orders' ? 'block' : 'none';
    if(tabName === 'orders') { refreshOrders(); }
  });
});

function escapeHtml(str){ return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }

// Initialize
if(auth){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display = 'block';
  renderAll();
}

document.getElementById('editModal').addEventListener('click', (e) => { if(e.target === document.getElementById('editModal')) closeModal(); });
</script>
