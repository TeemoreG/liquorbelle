<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>LiquorBelle Admin — Full Control</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#17171f;
  --bg4:#1e1e28;
  --gold:#f0a500;
  --gold-dim:rgba(240,165,0,0.12);
  --red:#e03131;
  --red-dim:rgba(224,49,49,0.12);
  --green:#2ecc71;
  --green-dim:rgba(46,204,113,0.12);
  --blue:#3b82f6;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.1);
  --ink:#f0eef8;
  --muted:#6b6780;
  --mid:#9994ad;
  --fh:'Sora',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
  --radius:16px;
  --radius-sm:12px;
  --radius-pill:999px;
}
body{background:var(--bg);font-family:var(--fb);color:var(--ink);}

/* Login */
.login-screen{
  position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;
}
.login-card{
  background:var(--bg2);border-radius:24px;padding:40px;width:380px;border:1px solid var(--border);
}
.login-card h2{font-family:var(--fh);margin-bottom:24px;color:var(--gold);}
.login-input{width:100%;padding:14px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--ink);margin-bottom:12px;}
.login-btn{width:100%;padding:14px;background:var(--gold);color:#000;border:none;border-radius:12px;font-weight:700;cursor:pointer;}
.login-error{color:var(--red);font-size:12px;margin-top:12px;display:none;}

/* Admin Header */
.admin-header{
  background:var(--bg2);padding:12px 5%;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:10px;}
.logo-img{height:36px;border-radius:8px;}
.logo-name{font-family:var(--fh);font-weight:800;font-size:1.1rem;}
.logo-name em{color:var(--gold);font-style:normal;}
.admin-badge{background:var(--gold-dim);padding:6px 14px;border-radius:40px;font-size:12px;font-weight:600;color:var(--gold);}
.logout-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:40px;cursor:pointer;}

/* Stats Grid */
.stats-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px;
}
.stat-card{background:var(--bg2);border-radius:16px;padding:20px;border:1px solid var(--border);}
.stat-card h4{font-size:12px;color:var(--muted);margin-bottom:8px;text-transform:uppercase;}
.stat-card .value{font-size:28px;font-weight:800;color:var(--gold);font-family:var(--fh);}
.stat-card .sub{font-size:11px;color:var(--muted);margin-top:4px;}

/* Tabs */
.tabs{display:flex;gap:4px;padding:0 5%;background:var(--bg);border-bottom:1px solid var(--border);}
.tab{
  padding:14px 24px;background:transparent;border:none;color:var(--muted);cursor:pointer;
  font-weight:600;font-size:14px;border-bottom:2px solid transparent;transition:all 0.2s;
}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

/* Main Content */
.main-content{padding:24px 5%;max-width:1400px;margin:0 auto;}

/* Add Product Form */
.add-product-card{
  background:var(--bg2);border-radius:20px;padding:24px;margin-bottom:24px;border:1px solid var(--border);
}
.section-title{font-family:var(--fh);font-size:1rem;font-weight:700;margin-bottom:16px;color:var(--gold);}
.form-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:16px;
}
.form-grid input, .form-grid select, .form-grid textarea{
  padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  color:var(--ink);font-family:var(--fb);font-size:13px;
}
.submit-btn{
  background:var(--gold);color:#000;border:none;padding:12px 24px;border-radius:40px;font-weight:700;cursor:pointer;
}
.image-preview{width:50px;height:50px;border-radius:8px;object-fit:cover;margin-top:8px;}

/* Products Table */
.products-container{
  background:var(--bg2);border-radius:20px;border:1px solid var(--border);overflow-x:auto;
}
.products-header{
  display:grid;grid-template-columns:60px 1fr 120px 100px 100px 80px;background:var(--bg3);padding:14px 16px;
  font-weight:600;font-size:13px;border-bottom:1px solid var(--border);
}
.product-row{
  display:grid;grid-template-columns:60px 1fr 120px 100px 100px 80px;padding:14px 16px;
  align-items:center;border-bottom:1px solid var(--border);font-size:13px;transition:background 0.2s;
}
.product-row:hover{background:rgba(255,255,255,0.02);}
.product-img{width:40px;height:40px;object-fit:cover;border-radius:8px;background:var(--bg3);}
.product-name{font-weight:600;}
.product-category{font-size:11px;padding:3px 10px;border-radius:40px;background:var(--bg3);display:inline-block;}
.edit-btn,.delete-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;padding:6px;border-radius:6px;}
.edit-btn:hover{color:var(--gold);background:var(--gold-dim);}
.delete-btn:hover{color:var(--red);background:var(--red-dim);}

/* Orders List */
.orders-list{display:flex;flex-direction:column;gap:16px;}
.order-card{background:var(--bg2);border-radius:16px;border:1px solid var(--border);overflow:hidden;}
.order-header{
  display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
  background:var(--bg3);border-bottom:1px solid var(--border);
}
.order-id{font-family:monospace;font-weight:700;}
.order-status{padding:4px 12px;border-radius:40px;font-size:11px;font-weight:700;}
.status-pending{background:var(--gold-dim);color:var(--gold);}
.status-paid{background:var(--green-dim);color:var(--green);}
.status-delivered{background:var(--blue);color:#fff;}
.order-items{padding:16px 20px;}
.order-item{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.order-footer{
  display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
  border-top:1px solid var(--border);
}
.order-total{font-size:20px;font-weight:800;color:var(--gold);font-family:var(--fh);}
.order-actions{display:flex;gap:8px;}
.order-btn{padding:8px 16px;border-radius:40px;font-size:12px;font-weight:600;cursor:pointer;border:none;}
.btn-mark-paid{background:var(--green-dim);color:var(--green);}
.btn-mark-delivered{background:var(--gold-dim);color:var(--gold);}
.btn-delete{background:var(--red-dim);color:var(--red);}

.empty-state{text-align:center;padding:60px;color:var(--muted);}
.snack{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--bg3);border:1px solid var(--gold);padding:10px 24px;
  border-radius:40px;font-size:13px;opacity:0;transition:opacity 0.2s;z-index:200;
}
.snack.on{opacity:1;}

@media(max-width:768px){
  .products-header,.product-row{grid-template-columns:50px 1fr 80px 70px 60px;}
  .product-row .product-category,.products-header .category{display:none;}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="https://i.postimg.cc/PxwLVrdh/227a55e3-ad16-4893-9e87-03dfc202814f.png" alt="LiquorBelle" style="height:50px;margin-bottom:20px;">
    <h2>Admin Login</h2>
    <input type="text" id="username" class="login-input" placeholder="Username">
    <input type="password" id="password" class="login-input" placeholder="Password">
    <button class="login-btn" onclick="login()">Sign In</button>
    <div class="login-error" id="loginError">Invalid credentials</div>
  </div>
</div>

<!-- MAIN ADMIN DASHBOARD -->
<div id="adminApp" style="display:none;">
  <div class="admin-header">
    <div class="logo">
      <img class="logo-img" src="https://i.postimg.cc/PxwLVrdh/227a55e3-ad16-4893-9e87-03dfc202814f.png" alt="LiquorBelle">
      <span class="logo-name">Liquor<em>Belle</em> Admin</span>
    </div>
    <div style="display:flex;gap:12px;align-items:center;">
      <span class="admin-badge"><i class="ph ph-shield-check"></i> Super Admin</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="products">📦 Products</button>
    <button class="tab" data-tab="orders">📋 Orders</button>
    <button class="tab" data-tab="stats">📊 Analytics</button>
  </div>

  <div class="main-content">
    <!-- PRODUCTS TAB -->
    <div id="productsTab">
      <!-- Stats Row -->
      <div class="stats-grid" id="productStats"></div>

      <!-- Add Product Form -->
      <div class="add-product-card">
        <div class="section-title"><i class="ph ph-plus-circle"></i> Add New Product</div>
        <div class="form-grid">
          <input type="text" id="prodName" placeholder="Product Name">
          <input type="text" id="prodSub" placeholder="Description (e.g. 750ml, Scotch)">
          <input type="number" id="prodPrice" placeholder="Price (KES)">
          <select id="prodCategory">
            <option value="whisky">Whisky</option><option value="vodka">Vodka</option>
            <option value="wine">Wine</option><option value="beer">Beer</option>
            <option value="rum">Rum</option><option value="gin">Gin</option>
            <option value="cognac">Cognac/Brandy</option><option value="champagne">Champagne</option>
            <option value="kenyan">Kenyan Spirits</option>
          </select>
          <select id="prodBadge">
            <option value="">No Badge</option><option value="hot">🔥 Best Seller</option>
            <option value="prem">⭐ Premium</option><option value="local">🇰🇪 Kenyan Brand</option>
          </select>
          <input type="text" id="prodImage" placeholder="Image URL">
          <input type="number" id="prodStock" placeholder="Stock (leave empty = unlimited)">
        </div>
        <div id="imagePreview" style="margin-bottom:12px;"></div>
        <button class="submit-btn" onclick="addProduct()"><i class="ph ph-floppy-disk"></i> Save Product</button>
      </div>

      <!-- Products Table -->
      <div class="products-container">
        <div class="products-header">
          <div>Image</div><div>Name</div><div class="category">Category</div><div>Price</div><div>Stock</div><div>Actions</div>
        </div>
        <div id="productsList"></div>
      </div>
    </div>

    <!-- ORDERS TAB -->
    <div id="ordersTab" style="display:none;">
      <div class="stats-grid" id="orderStats"></div>
      <div id="ordersList" class="orders-list"></div>
    </div>

    <!-- STATS TAB -->
    <div id="statsTab" style="display:none;">
      <div class="stats-grid">
        <div class="stat-card"><h4>Total Revenue</h4><div class="value" id="totalRevenue">KES 0</div></div>
        <div class="stat-card"><h4>Completed Orders</h4><div class="value" id="completedOrders">0</div></div>
        <div class="stat-card"><h4>Average Order</h4><div class="value" id="avgOrder">KES 0</div></div>
        <div class="stat-card"><h4>Total Products</h4><div class="value" id="totalProductsStat">0</div></div>
      </div>
    </div>
  </div>
</div>

<div class="snack" id="snack"></div>

<script>
// ==================== INITIAL DATA ====================
const DEFAULT_PRODUCTS = [
  {id:1,name:"Johnnie Walker Black Label",sub:"Blended Scotch 750ml",price:3500,category:"whisky",badge:"hot",image:"https://images.vivino.com/thumbs/ApnIiXjcT5Kc33OHgNb9dA_pb_x600.png",stock:null},
  {id:2,name:"Jameson Irish Whiskey",sub:"Irish Whiskey 750ml",price:3200,category:"whisky",badge:"",image:"https://www.thewhiskyexchange.com/images/products/10399_full.jpg",stock:null},
  {id:3,name:"Hennessy VS Cognac",sub:"Cognac 750ml",price:5500,category:"cognac",badge:"prem",image:"",stock:null},
  {id:4,name:"Smirnoff Red Label",sub:"Vodka 750ml",price:1800,category:"vodka",badge:"",image:"",stock:null},
  {id:5,name:"Tusker Lager",sub:"Kenyan Beer 500ml",price:230,category:"beer",badge:"local",image:"https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/Tusker_Lager_can.jpg/440px-Tusker_Lager_can.jpg",stock:null},
];

let products = JSON.parse(localStorage.getItem('liquorbelle_products'));
if(!products || products.length === 0){
  products = DEFAULT_PRODUCTS;
  localStorage.setItem('liquorbelle_products', JSON.stringify(products));
}
let orders = JSON.parse(localStorage.getItem('liquorbelle_admin_orders') || '[]');
let auth = sessionStorage.getItem('liquorbelle_admin') === 'true';

function saveProducts(){ localStorage.setItem('liquorbelle_products', JSON.stringify(products)); }
function saveOrders(){ localStorage.setItem('liquorbelle_admin_orders', JSON.stringify(orders)); }
function toast(msg){ const t=document.getElementById('snack'); t.innerText=msg; t.classList.add('on'); setTimeout(()=>t.classList.remove('on'),2500); }

// ==================== LOGIN ====================
function login(){
  const u = document.getElementById('username').value;
  const p = document.getElementById('password').value;
  if((u === 'admin' || u === 'liquorbelle') && p === 'admin123'){
    sessionStorage.setItem('liquorbelle_admin', 'true');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminApp').style.display = 'block';
    auth = true;
    renderAll();
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout(){ sessionStorage.removeItem('liquorbelle_admin'); location.reload(); }

// ==================== TAB SWITCHING ====================
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const tabName = tab.dataset.tab;
    document.getElementById('productsTab').style.display = tabName === 'products' ? 'block' : 'none';
    document.getElementById('ordersTab').style.display = tabName === 'orders' ? 'block' : 'none';
    document.getElementById('statsTab').style.display = tabName === 'stats' ? 'block' : 'none';
    if(tabName === 'orders') renderOrders();
    if(tabName === 'stats') renderStats();
  });
});

// ==================== PRODUCT MANAGEMENT ====================
function renderProducts(){
  const container = document.getElementById('productsList');
  if(products.length === 0){
    container.innerHTML = '<div class="empty-state">No products. Add your first product above.</div>';
    return;
  }
  container.innerHTML = products.map(p => `
    <div class="product-row">
      <div><img class="product-img" src="${p.image || 'https://i.postimg.cc/DzB8Bvmx/glass-whiskey-with-ice-bottle-with-label-vector-hand-drawn-color-illustration-168440-913.avif'}" onerror="this.src='https://i.postimg.cc/DzB8Bvmx/glass-whiskey-with-ice-bottle-with-label-vector-hand-drawn-color-illustration-168440-913.avif'"></div>
      <div class="product-name">${escapeHtml(p.name)}<br><span style="font-size:11px;color:var(--muted);">${escapeHtml(p.sub || '')}</span></div>
      <div><span class="product-category">${p.category}</span></div>
      <div style="color:var(--gold);font-weight:700;">KES ${(p.price || 0).toLocaleString()}</div>
      <div>${p.stock == null ? '∞' : p.stock === 0 ? 'Out' : p.stock}</div>
      <div><button class="edit-btn" onclick="openEditModal(${p.id})"><i class="ph ph-pencil-simple"></i></button><button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="ph ph-trash"></i></button></div>
    </div>
  `).join('');
}

function renderProductStats(){
  const totalValue = products.reduce((s,p) => s + (p.price || 0), 0);
  const avgPrice = products.length ? Math.round(totalValue / products.length) : 0;
  document.getElementById('productStats').innerHTML = `
    <div class="stat-card"><h4>Total Products</h4><div class="value">${products.length}</div></div>
    <div class="stat-card"><h4>Categories</h4><div class="value">${new Set(products.map(p=>p.category)).size}</div></div>
    <div class="stat-card"><h4>Avg Price</h4><div class="value">KES ${avgPrice.toLocaleString()}</div></div>
    <div class="stat-card"><h4>Total Value</h4><div class="value">KES ${totalValue.toLocaleString()}</div></div>
  `;
  document.getElementById('totalProductsStat').innerText = products.length;
}

function addProduct(){
  const name = document.getElementById('prodName').value.trim();
  const sub = document.getElementById('prodSub').value.trim();
  const price = parseFloat(document.getElementById('prodPrice').value);
  const category = document.getElementById('prodCategory').value;
  const badge = document.getElementById('prodBadge').value;
  const image = document.getElementById('prodImage').value.trim();
  const stockVal = document.getElementById('prodStock').value.trim();
  const stock = stockVal === '' ? null : parseInt(stockVal);
  
  if(!name || !price || isNaN(price)){ toast('Name and price required'); return; }
  const newId = products.length > 0 ? Math.max(...products.map(p=>p.id)) + 1 : 100;
  products.push({id:newId, name, sub, price, category, badge, image, stock});
  saveProducts();
  renderProducts();
  renderProductStats();
  document.getElementById('prodName').value = '';
  document.getElementById('prodSub').value = '';
  document.getElementById('prodPrice').value = '';
  document.getElementById('prodImage').value = '';
  document.getElementById('prodStock').value = '';
  toast('✓ Product added – instantly live on shop');
}

function deleteProduct(id){
  if(confirm('Delete permanently?')){
    products = products.filter(p => p.id !== id);
    saveProducts();
    renderProducts();
    renderProductStats();
    toast('Product deleted');
  }
}

let editingId = null;
function openEditModal(id){
  const p = products.find(p => p.id === id);
  if(!p) return;
  editingId = id;
  document.getElementById('editName').value = p.name;
  document.getElementById('editSub').value = p.sub || '';
  document.getElementById('editPrice').value = p.price;
  document.getElementById('editCategory').value = p.category;
  document.getElementById('editBadge').value = p.badge || '';
  document.getElementById('editImage').value = p.image || '';
  document.getElementById('editStock').value = p.stock != null ? p.stock : '';
  document.getElementById('editModal').style.display = 'flex';
}
function closeModal(){ document.getElementById('editModal').style.display = 'none'; editingId = null; }
function saveEdit(){
  const index = products.findIndex(p => p.id === editingId);
  if(index !== -1){
    const stockVal = document.getElementById('editStock').value.trim();
    products[index].name = document.getElementById('editName').value.trim();
    products[index].sub = document.getElementById('editSub').value.trim();
    products[index].price = parseFloat(document.getElementById('editPrice').value);
    products[index].category = document.getElementById('editCategory').value;
    products[index].badge = document.getElementById('editBadge').value;
    products[index].image = document.getElementById('editImage').value.trim();
    products[index].stock = stockVal === '' ? null : parseInt(stockVal);
    saveProducts();
    renderProducts();
    renderProductStats();
    toast('✓ Product updated – shop updated instantly');
    closeModal();
  }
}

// ==================== ORDER MANAGEMENT ====================
function renderOrders(){
  const container = document.getElementById('ordersList');
  if(orders.length === 0){
    container.innerHTML = '<div class="empty-state">No orders yet</div>';
    return;
  }
  container.innerHTML = orders.map(o => `
    <div class="order-card">
      <div class="order-header">
        <div><span class="order-id">${o.id}</span><br><span style="font-size:12px;">${o.customer || 'Customer'}</span><br><span style="font-size:11px;color:var(--muted);">${o.time || o.date}</span></div>
        <span class="order-status status-${o.status}">${o.status === 'pending' ? '⏳ Pending' : o.status === 'paid' ? '✅ Paid' : '🚚 Delivered'}</span>
      </div>
      <div class="order-items">${o.items?.map(i => `<div class="order-item"><span>${escapeHtml(i.name)} × ${i.qty}</span><span>KES ${(i.price * i.qty).toLocaleString()}</span></div>`).join('') || ''}</div>
      <div class="order-footer">
        <div class="order-total">KES ${(o.total || 0).toLocaleString()}</div>
        <div class="order-actions">
          ${o.status === 'pending' ? `<button class="order-btn btn-mark-paid" onclick="markOrderPaid('${o.id}')"><i class="ph ph-check-circle"></i> Mark Paid</button>` : ''}
          ${o.status === 'paid' ? `<button class="order-btn btn-mark-delivered" onclick="markOrderDelivered('${o.id}')"><i class="ph ph-truck"></i> Mark Delivered</button>` : ''}
          <button class="order-btn btn-delete" onclick="deleteOrder('${o.id}')"><i class="ph ph-trash"></i> Delete</button>
        </div>
      </div>
    </div>
  `).join('');
}

function renderOrderStats(){
  const totalOrders = orders.length;
  const completed = orders.filter(o => o.status === 'delivered').length;
  const revenue = orders.filter(o => o.status === 'delivered' || o.status === 'paid').reduce((s,o) => s + (o.total || 0), 0);
  const pending = orders.filter(o => o.status === 'pending').length;
  document.getElementById('orderStats').innerHTML = `
    <div class="stat-card"><h4>Total Orders</h4><div class="value">${totalOrders}</div></div>
    <div class="stat-card"><h4>Pending</h4><div class="value">${pending}</div></div>
    <div class="stat-card"><h4>Completed</h4><div class="value">${completed}</div></div>
    <div class="stat-card"><h4>Revenue</h4><div class="value">KES ${revenue.toLocaleString()}</div></div>
  `;
}

function markOrderPaid(id){
  const order = orders.find(o => o.id === id);
  if(order){ order.status = 'paid'; saveOrders(); renderOrders(); renderOrderStats(); toast('Order marked as PAID'); }
}
function markOrderDelivered(id){
  const order = orders.find(o => o.id === id);
  if(order){ order.status = 'delivered'; saveOrders(); renderOrders(); renderOrderStats(); toast('Order marked as DELIVERED'); }
}
function deleteOrder(id){
  if(confirm('Delete this order?')){ orders = orders.filter(o => o.id !== id); saveOrders(); renderOrders(); renderOrderStats(); toast('Order deleted'); }
}

// ==================== STATS ====================
function renderStats(){
  const delivered = orders.filter(o => o.status === 'delivered');
  const revenue = delivered.reduce((s,o) => s + (o.total || 0), 0);
  const avg = delivered.length ? Math.round(revenue / delivered.length) : 0;
  document.getElementById('totalRevenue').innerHTML = `KES ${revenue.toLocaleString()}`;
  document.getElementById('completedOrders').innerHTML = delivered.length;
  document.getElementById('avgOrder').innerHTML = `KES ${avg.toLocaleString()}`;
}

// ==================== UTILITIES ====================

// Image preview
document.getElementById('prodImage').addEventListener('input', function(){
  const url = this.value;
  const preview = document.getElementById('imagePreview');
  if(url && (url.startsWith('http') || url.startsWith('https'))){
    preview.innerHTML = `<img src="${url}" class="image-preview" onerror="this.style.display='none'">`;
  } else { preview.innerHTML = ''; }
});
