<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>LiquorBelle — Login or Register</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#17171f;
  --bg4:#1e1e28;
  --gold:#f0a500;
  --gold-dim:rgba(240,165,0,0.12);
  --red:#e03131;
  --red-dim:rgba(224,49,49,0.12);
  --green:#2ecc71;
  --border:rgba(255,255,255,0.06);
  --ink:#f0eef8;
  --muted:#6b6780;
  --mid:#9994ad;
  --fh:'Sora',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
  --radius:16px;
  --radius-pill:999px;
}
body{background:var(--bg);font-family:var(--fb);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}

.login-container{max-width:440px;width:100%;margin:0 auto;}
.login-card{
  background:var(--bg2);
  border-radius:28px;
  padding:40px 32px;
  border:1px solid var(--border);
  box-shadow:0 0 0 1px rgba(224,49,49,0.08), 0 40px 100px rgba(0,0,0,0.7);
  position:relative;
}
.login-card::before{
  content:'';position:absolute;top:-1px;left:50%;transform:translateX(-50%);
  width:64px;height:3px;border-radius:0 0 4px 4px;
  background:linear-gradient(90deg,transparent,var(--red),transparent);
}
.logo{text-align:center;margin-bottom:24px;}
.logo-img{height:55px;margin-bottom:12px;}
.logo-name{font-family:var(--fh);font-size:1.3rem;font-weight:800;color:var(--ink);}
.logo-name em{color:var(--gold);font-style:normal;}
.live-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(46,204,113,0.12);
  border:1px solid rgba(46,204,113,0.2);
  padding:4px 12px;border-radius:var(--radius-pill);
  font-size:.7rem;font-weight:700;color:var(--green);
  margin:12px auto 0;
  width:fit-content;
}
.live-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.welcome-text{text-align:center;margin-bottom:24px;}
.welcome-text h2{font-family:var(--fh);font-size:1.5rem;font-weight:800;margin-bottom:6px;}
.welcome-text p{font-size:.8rem;color:var(--muted);}

.input-group{margin-bottom:14px;}
.input-group input{
  width:100%;
  padding:14px 16px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:14px;
  color:var(--ink);
  font-size:.9rem;
  outline:none;
  transition:all 0.2s;
}
.input-group input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-dim);}
.input-group input::placeholder{color:var(--muted);}
.input-group label{
  display:block;
  font-size:.7rem;
  color:var(--muted);
  margin-bottom:5px;
}
.optional-badge{
  font-size:.6rem;
  color:var(--mid);
  margin-left:6px;
  font-weight:400;
}

.otp-group{display:none;gap:12px;margin-bottom:14px;}
.otp-input{
  flex:1;
  padding:14px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:14px;
  color:var(--ink);
  font-size:1.1rem;
  font-weight:700;
  text-align:center;
  letter-spacing:.2em;
  outline:none;
}
.otp-input:focus{border-color:var(--red);}

.btn-primary{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,var(--red),#c0392b);
  border:none;
  border-radius:14px;
  color:#fff;
  font-weight:700;
  font-size:.95rem;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  margin-top:8px;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(224,49,49,0.3);}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none;}

.resend-link{
  text-align:center;
  margin-top:12px;
  font-size:.75rem;
  color:var(--gold);
  cursor:pointer;
  display:none;
}
.resend-link:hover{text-decoration:underline;}

.message-box{
  font-size:.75rem;
  padding:10px;
  border-radius:12px;
  margin-top:12px;
  display:none;
  text-align:center;
}
.message-box.error{background:rgba(224,49,49,0.1);border:1px solid rgba(224,49,49,0.2);color:#ff8a7a;}
.message-box.success{background:rgba(46,204,113,0.1);border:1px solid rgba(46,204,113,0.2);color:var(--green);}

.divider{display:flex;align-items:center;gap:10px;margin:20px 0 16px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:.65rem;color:var(--muted);}

.note{text-align:center;font-size:.65rem;color:var(--muted);}
.note strong{color:var(--gold);}

.spinner{
  display:inline-block;
  width:16px;
  height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-radius:50%;
  border-top-color:#fff;
  animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <img class="logo-img" src="https://i.postimg.cc/PxwLVrdh/227a55e3-ad16-4893-9e87-03dfc202814f.png" alt="LiquorBelle">
      <div class="logo-name">Liquor<em>Belle</em></div>
      <div class="live-badge"><span class="dot"></span>OPEN · DELIVERING NOW</div>
    </div>

    <div class="welcome-text">
      <h2>Welcome Back</h2>
      <p>Enter your email to receive a verification code</p>
    </div>

    <!-- Email Input (Required) -->
    <div class="input-group">
      <label>Email Address <span style="color:var(--red);">*</span></label>
      <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="email">
    </div>

    <!-- Phone Number Input (Optional - for delivery contact only) -->
    <div class="input-group">
      <label>Phone Number <span class="optional-badge">(optional - for delivery)</span></label>
      <input type="tel" id="phoneInput" placeholder="0712345678" autocomplete="tel">
    </div>

    <!-- OTP Input (hidden initially) -->
    <div class="otp-group" id="otpGroup">
      <input type="text" id="otpInput" class="otp-input" placeholder="6-digit code" maxlength="6" inputmode="numeric">
    </div>

    <!-- Action Button -->
    <button class="btn-primary" id="actionBtn">
      <span>Send Code</span>
    </button>

    <!-- Resend Link -->
    <div class="resend-link" id="resendLink">Didn't receive code? Resend</div>

    <!-- Message Box -->
    <div class="message-box" id="messageBox"></div>

    <div class="divider"><span>secure & encrypted</span></div>
    <div class="note">We'll email you a 6-digit code to log in.<br>Phone number is optional – used only for delivery contact.</div>
  </div>
</div>

<script>
// ==================== CONFIGURATION ====================
const API_BASE_URL = 'https://liquorbelle-mpesa-backend.onrender.com';

let pendingEmail = null;
let pendingOTP = null;
let step = 'email'; // 'email' or 'otp'

const emailInput = document.getElementById('emailInput');
const phoneInput = document.getElementById('phoneInput');
const otpInput = document.getElementById('otpInput');
const otpGroup = document.getElementById('otpGroup');
const actionBtn = document.getElementById('actionBtn');
const resendLink = document.getElementById('resendLink');
const messageBox = document.getElementById('messageBox');

function showMessage(msg, isError = true){
  messageBox.textContent = msg;
  messageBox.className = isError ? 'message-box error' : 'message-box success';
  messageBox.style.display = 'block';
  setTimeout(() => {
    messageBox.style.display = 'none';
  }, 5000);
}

function generateOTP(){ return Math.floor(100000 + Math.random() * 900000).toString(); }

async function sendOTP(email, otp){
  try {
    const response = await fetch(`${API_BASE_URL}/api/send-email-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp })
    });
    return await response.json();
  } catch(e) {
    console.error('Send OTP error:', e);
    return { success: false, message: 'Network error. Please try again.' };
  }
}

// Get phone number (optional)
function formatPhoneNumber(phone){
  if(!phone) return '';
  let cleaned = phone.replace(/\D/g, '');
  if(cleaned.startsWith('0')) cleaned = cleaned.slice(1);
  if(!cleaned.startsWith('254')) cleaned = '254' + cleaned;
  return cleaned;
}

// Check if user exists in localStorage
function getUserByEmail(email){
  const users = JSON.parse(localStorage.getItem('liquorbelle_users') || '[]');
  return users.find(u => u.email === email);
}

function saveUser(user){
  const users = JSON.parse(localStorage.getItem('liquorbelle_users') || '[]');
  const existingIndex = users.findIndex(u => u.email === user.email);
  if(existingIndex !== -1){
    users[existingIndex] = user;
  } else {
    users.push(user);
  }
  localStorage.setItem('liquorbelle_users', JSON.stringify(users));
}

async function sendCode(){
  const email = emailInput.value.trim().toLowerCase();
  if(!email){
    showMessage('Please enter your email address');
    return;
  }
  if(!email.includes('@') || !email.includes('.')){
    showMessage('Please enter a valid email address');
    return;
  }

  // Show loading
  actionBtn.disabled = true;
  actionBtn.innerHTML = '<div class="spinner"></div> Sending...';

  const otp = generateOTP();
  pendingOTP = otp;
  pendingEmail = email;

  const result = await sendOTP(email, otp);

  if(result.success){
    showMessage(`✓ Verification code sent to ${email}! Check your inbox (spam folder)`, false);
    // Switch to OTP step
    step = 'otp';
    otpGroup.style.display = 'flex';
    actionBtn.innerHTML = 'Verify & Login →';
    resendLink.style.display = 'block';
    emailInput.disabled = true;
    emailInput.style.opacity = '0.6';
    otpInput.focus();
  } else {
    showMessage(result.message || 'Failed to send code. Please try again.');
    actionBtn.innerHTML = 'Send Code';
  }
  actionBtn.disabled = false;
}

async function verifyOTP(){
  const enteredOTP = otpInput.value.trim();
  if(!enteredOTP || enteredOTP.length !== 6){
    showMessage('Please enter the 6-digit code');
    return;
  }

  if(enteredOTP !== pendingOTP){
    showMessage('Invalid code. Please try again.');
    return;
  }

  actionBtn.disabled = true;
  actionBtn.innerHTML = '<div class="spinner"></div> Logging in...';

  // Get optional phone number
  const phoneNumber = phoneInput.value.trim();
  const formattedPhone = formatPhoneNumber(phoneNumber);

  // Check if user exists
  let existingUser = getUserByEmail(pendingEmail);
  
  if(!existingUser){
    // New user - register
    existingUser = {
      email: pendingEmail,
      phone: formattedPhone || '',
      name: pendingEmail.split('@')[0],
      joined: new Date().toISOString(),
      addresses: ['Dagoretti Road, Opposite Quickmart'],
      orders: JSON.parse(localStorage.getItem(`liquorbelle_orders_${pendingEmail}`) || '[]')
    };
    saveUser(existingUser);
    showMessage('✓ Account created successfully!', false);
  } else {
    // Update phone number if provided and different
    if(formattedPhone && existingUser.phone !== formattedPhone){
      existingUser.phone = formattedPhone;
      saveUser(existingUser);
    }
    showMessage('✓ Welcome back!', false);
  }

  // Save current session user
  localStorage.setItem('liquorbelle_user', JSON.stringify(existingUser));
  
  showMessage('✓ Login successful! Redirecting...', false);
  
  setTimeout(() => {
    window.location.href = 'dashboard.html';
  }, 1500);
}

async function resendCode(){
  if(!pendingEmail){
    showMessage('Please enter your email first');
    return;
  }
  
  resendLink.style.opacity = '0.5';
  resendLink.style.pointerEvents = 'none';
  
  const otp = generateOTP();
  pendingOTP = otp;
  
  const result = await sendOTP(pendingEmail, otp);
  
  if(result.success){
    showMessage(`✓ New code sent to ${pendingEmail}!`, false);
  } else {
    showMessage('Failed to resend code. Try again.');
  }
  
  setTimeout(() => {
    resendLink.style.opacity = '1';
    resendLink.style.pointerEvents = 'auto';
  }, 3000);
}

// Event listeners
actionBtn.addEventListener('click', () => {
  if(step === 'email'){
    sendCode();
  } else {
    verifyOTP();
  }
});

resendLink.addEventListener('click', resendCode);

// Enter key support
emailInput.addEventListener('keypress', (e) => {
  if(e.key === 'Enter' && step === 'email') sendCode();
});
otpInput.addEventListener('keypress', (e) => {
  if(e.key === 'Enter' && step === 'otp') verifyOTP();
});

// Check if already logged in
const currentUser = JSON.parse(localStorage.getItem('liquorbelle_user') || 'null');
if(currentUser){
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
