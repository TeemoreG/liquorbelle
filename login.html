<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>LiquorBelle — Login or Register</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#17171f;
  --bg4:#1e1e28;
  --gold:#f0a500;
  --red:#e03131;
  --green:#2ecc71;
  --border:rgba(255,255,255,0.06);
  --ink:#f0eef8;
  --muted:#6b6780;
  --fh:'Sora',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
}
body{background:var(--bg);font-family:var(--fb);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-container{max-width:440px;width:100%;margin:0 auto;}
.login-card{
  background:var(--bg2);
  border-radius:28px;
  padding:40px 32px;
  border:1px solid var(--border);
  box-shadow:0 40px 100px rgba(0,0,0,0.7);
}
.logo{text-align:center;margin-bottom:24px;}
.logo-img{height:55px;margin-bottom:12px;}
.logo-name{font-family:var(--fh);font-size:1.3rem;font-weight:800;}
.logo-name em{color:var(--gold);font-style:normal;}

.auth-tabs{
  display:flex;
  gap:8px;
  margin-bottom:24px;
  background:var(--bg3);
  padding:4px;
  border-radius:60px;
}
.auth-tab{
  flex:1;
  padding:12px;
  text-align:center;
  font-weight:700;
  font-size:.9rem;
  cursor:pointer;
  border-radius:60px;
  transition:all 0.2s;
  color:var(--muted);
  background:transparent;
}
.auth-tab.active{
  background:linear-gradient(135deg,var(--red),#c0392b);
  color:#fff;
}
.auth-tab:not(.active):hover{
  background:rgba(255,255,255,0.05);
  color:var(--ink);
}

.input-group{margin-bottom:14px;}
.input-group input{
  width:100%;
  padding:14px 16px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:14px;
  color:var(--ink);
  font-size:.9rem;
  outline:none;
}
.input-group input:focus{border-color:var(--red);}
.remember-group{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}
.remember-group label{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:.75rem;
  color:var(--muted);
  cursor:pointer;
}
.remember-group input{
  width:16px;
  height:16px;
  cursor:pointer;
}
.btn-primary{
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,var(--red),#c0392b);
  border:none;
  border-radius:14px;
  color:#fff;
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
}
.btn-secondary{
  width:100%;
  padding:14px;
  background:transparent;
  border:1px solid var(--gold);
  border-radius:14px;
  color:var(--gold);
  font-weight:700;
  cursor:pointer;
  margin-top:8px;
}
.otp-group{display:none;margin-bottom:14px;}
.otp-group input{
  width:100%;
  padding:14px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:14px;
  color:var(--ink);
  text-align:center;
  font-size:1.2rem;
  letter-spacing:4px;
}
.message-box{
  font-size:.75rem;
  padding:10px;
  border-radius:12px;
  margin-top:12px;
  display:none;
  text-align:center;
}
.message-box.error{background:rgba(224,49,49,0.1);color:#ff8a7a;}
.message-box.success{background:rgba(46,204,113,0.1);color:var(--green);}
.resend-link{text-align:center;margin-top:12px;font-size:.75rem;color:var(--gold);cursor:pointer;display:none;}
.switch-account{
  text-align:center;
  margin-top:16px;
  font-size:.7rem;
  color:var(--muted);
  cursor:pointer;
  display:none;
}
.switch-account:hover{color:var(--gold);}
.terms-note{
  text-align:center;
  font-size:.6rem;
  color:var(--muted);
  margin-top:20px;
}
</style>
</head>
<body>
<div class="login-container">
  <div class="login-card">
    <div class="logo">
      <img class="logo-img" src="https://i.postimg.cc/PxwLVrdh/227a55e3-ad16-4893-9e87-03dfc202814f.png" alt="LiquorBelle">
      <div class="logo-name">Liquor<em>Belle</em></div>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="loginTab">Login</div>
      <div class="auth-tab" id="registerTab">Register</div>
    </div>

    <!-- LOGIN FORM -->
    <div id="loginForm">
      <div class="input-group">
        <input type="email" id="loginEmail" placeholder="Email address" autocomplete="email">
      </div>
      <div class="input-group">
        <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
      </div>
      <div class="remember-group">
        <label>
          <input type="checkbox" id="rememberMeCheckbox">
          <span>Remember me</span>
        </label>
      </div>
      <button class="btn-primary" id="loginBtn">Login</button>
      <button class="btn-secondary" id="forgotPasswordBtn">Forgot Password?</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="registerForm" style="display:none;">
      <div class="input-group">
        <input type="email" id="regEmail" placeholder="Email address">
      </div>
      <div class="input-group">
        <input type="tel" id="regPhone" placeholder="Phone number (for delivery)">
      </div>
      <div class="input-group">
        <input type="password" id="regPassword" placeholder="Create password">
      </div>
      <div class="input-group">
        <input type="password" id="regConfirmPassword" placeholder="Confirm password">
      </div>
      <button class="btn-primary" id="sendCodeBtn">Send Verification Code</button>
    </div>

    <!-- OTP FORM (For Registration only) -->
    <div id="otpGroup" class="otp-group">
      <div class="input-group">
        <input type="text" id="otpInput" placeholder="Enter 6-digit code" maxlength="6">
      </div>
      <button class="btn-primary" id="verifyBtn">Verify & Complete Registration</button>
      <div class="resend-link" id="resendLink">Didn't receive code? Resend</div>
      <div class="switch-account" id="switchAccountBtn">← Back to registration</div>
    </div>

    <div class="message-box" id="messageBox"></div>
    <div class="terms-note">By continuing, you agree to our Terms of Service and confirm you are over 18.</div>
  </div>
</div>

<script>
const API_BASE = 'https://liquorbelle-mpesa-backend.onrender.com';
let pendingEmail = null;
let pendingOtp = null;
let pendingPassword = null;
let pendingPhone = null;

function showMessage(msg, isError = true) {
  const box = document.getElementById('messageBox');
  box.textContent = msg;
  box.className = isError ? 'message-box error' : 'message-box success';
  box.style.display = 'block';
  setTimeout(() => box.style.display = 'none', 5000);
}

// Tab Switching
document.getElementById('loginTab').onclick = () => {
  document.getElementById('loginTab').classList.add('active');
  document.getElementById('registerTab').classList.remove('active');
  document.getElementById('loginForm').style.display = 'block';
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('otpGroup').style.display = 'none';
  showMessage('Login with your email and password', false);
};

document.getElementById('registerTab').onclick = () => {
  document.getElementById('registerTab').classList.add('active');
  document.getElementById('loginTab').classList.remove('active');
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
  document.getElementById('otpGroup').style.display = 'none';
  showMessage('Create a new account', false);
};

// ==================== LOGIN FUNCTION (API) ====================
document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;
  
  if (!email || !email.includes('@')) {
    showMessage('Please enter a valid email address');
    return;
  }
  if (!password) {
    showMessage('Please enter your password');
    return;
  }
  
  try {
    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    
    if (!data.success) {
      showMessage(data.message);
      return;
    }
    
    // Save session
    const sessionUser = {
      id: data.user.id,
      email: data.user.email,
      name: data.user.name,
      phone: data.user.phone,
      loggedInAt: Date.now()
    };
    localStorage.setItem('liquorbelle_user', JSON.stringify(sessionUser));
    
    // Save remember me
    const rememberMe = document.getElementById('rememberMeCheckbox').checked;
    if (rememberMe) {
      localStorage.setItem('liquorbelle_saved_email', email);
      localStorage.setItem('liquorbelle_remember_me', 'true');
    }
    
    showMessage('Login successful! Redirecting...', false);
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);
  } catch (err) {
    console.error('Login error:', err);
    showMessage('Login failed. Please try again.');
  }
};

// ==================== FORGOT PASSWORD ====================
document.getElementById('forgotPasswordBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  if (!email) {
    showMessage('Enter your email address first');
    return;
  }
  
  // Generate temporary password
  const tempPassword = Math.random().toString(36).slice(-8);
  
  try {
    // In production, you would send this via email
    showMessage(`Temporary password: ${tempPassword}. Please login and change your password.`, false);
    document.getElementById('loginPassword').value = tempPassword;
  } catch(err) {
    showMessage('Error generating temporary password');
  }
};

// ==================== REGISTRATION - SEND OTP ====================
document.getElementById('sendCodeBtn').onclick = async () => {
  const email = document.getElementById('regEmail').value.trim().toLowerCase();
  const phone = document.getElementById('regPhone').value.trim();
  const password = document.getElementById('regPassword').value;
  const confirmPassword = document.getElementById('regConfirmPassword').value;
  
  if (!email || !email.includes('@')) {
    showMessage('Please enter a valid email address');
    return;
  }
  if (!phone) {
    showMessage('Phone number is required for delivery');
    return;
  }
  if (!password) {
    showMessage('Please create a password');
    return;
  }
  if (password !== confirmPassword) {
    showMessage('Passwords do not match');
    return;
  }
  if (password.length < 6) {
    showMessage('Password must be at least 6 characters');
    return;
  }
  
  pendingEmail = email;
  pendingPhone = phone;
  pendingPassword = password;
  
  const otp = Math.floor(100000 + Math.random() * 900000).toString();
  pendingOtp = otp;
  
  showMessage(`Sending verification code to ${email}...`, false);
  
  try {
    const res = await fetch(`${API_BASE}/api/send-email-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, otp })
    });
    const data = await res.json();
    
    if (data.success) {
      showMessage(`Code sent! Check your email. Demo code: ${otp}`, false);
    } else {
      showMessage(`Demo mode - use code: ${otp}`, false);
    }
  } catch(err) {
    showMessage(`Demo mode - use code: ${otp}`, false);
  }
  
  document.getElementById('registerForm').style.display = 'none';
  document.getElementById('otpGroup').style.display = 'block';
  document.getElementById('resendLink').style.display = 'block';
  document.getElementById('switchAccountBtn').style.display = 'block';
};

// ==================== VERIFY OTP & COMPLETE REGISTRATION ====================
document.getElementById('verifyBtn').onclick = async () => {
  const entered = document.getElementById('otpInput').value.trim();
  if (!entered || entered.length !== 6) {
    showMessage('Please enter the 6-digit verification code');
    return;
  }
  
  if (entered !== pendingOtp) {
    showMessage('Invalid code. Please try again.');
    return;
  }
  
  try {
    const res = await fetch(`${API_BASE}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: pendingEmail,
        password: pendingPassword,
        phone: pendingPhone,
        name: pendingEmail.split('@')[0]
      })
    });
    const data = await res.json();
    
    if (!data.success) {
      showMessage(data.message);
      return;
    }
    
    // Auto-login after registration
    const sessionUser = {
      id: data.user.id,
      email: data.user.email,
      name: data.user.name,
      phone: data.user.phone,
      loggedInAt: Date.now()
    };
    localStorage.setItem('liquorbelle_user', JSON.stringify(sessionUser));
    
    showMessage('Registration successful! Redirecting...', false);
    setTimeout(() => {
      window.location.href = 'index.html';
    }, 1500);
  } catch (err) {
    console.error('Registration error:', err);
    showMessage('Registration failed. Please try again.');
  }
};

// ==================== RESEND OTP ====================
document.getElementById('resendLink').onclick = async () => {
  if (!pendingEmail) return;
  const newOtp = Math.floor(100000 + Math.random() * 900000).toString();
  pendingOtp = newOtp;
  showMessage(`New code sent. Demo code: ${newOtp}`, false);
  
  try {
    await fetch(`${API_BASE}/api/send-email-otp`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: pendingEmail, otp: newOtp })
    });
  } catch(e) {}
};

// ==================== SWITCH BACK TO REGISTRATION ====================
document.getElementById('switchAccountBtn').onclick = () => {
  document.getElementById('otpGroup').style.display = 'none';
  document.getElementById('registerForm').style.display = 'block';
  document.getElementById('otpInput').value = '';
  document.getElementById('switchAccountBtn').style.display = 'none';
  document.getElementById('resendLink').style.display = 'none';
  pendingEmail = null;
  pendingOtp = null;
};

// ==================== CHECK IF ALREADY LOGGED IN ====================
const savedUser = localStorage.getItem('liquorbelle_user');
if (savedUser) {
  window.location.href = 'index.html';
}

// ==================== LOAD SAVED EMAIL ====================
const savedEmail = localStorage.getItem('liquorbelle_saved_email');
const rememberMe = localStorage.getItem('liquorbelle_remember_me') === 'true';
if (savedEmail && rememberMe) {
  document.getElementById('loginEmail').value = savedEmail;
  document.getElementById('rememberMeCheckbox').checked = true;
}
</script>
</body>
</html>
