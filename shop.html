<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>LiquorBelle — Shop All Drinks</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#e03131;
  --red-dim:rgba(224,49,49,0.12);
  --green:#2ecc71;
  --green-dim:rgba(46,204,113,0.12);
  --gold:#f0a500;
  --gold-dim:rgba(240,165,0,0.12);
  --bg:#0a0a0f;
  --bg2:#111118;
  --bg3:#17171f;
  --card:#1a1a24;
  --border:rgba(255,255,255,0.06);
  --border2:rgba(255,255,255,0.08);
  --ink:#f0eef8;
  --muted:#6b6780;
  --mid:#9994ad;
  --fh:'Sora',sans-serif;
  --fb:'Plus Jakarta Sans',sans-serif;
  --radius:16px;
  --radius-sm:12px;
}
body{background:var(--bg);font-family:var(--fb);color:var(--ink);overflow-x:hidden;padding-bottom:70px;}
.app-header{
  background:rgba(10,10,15,0.92);
  backdrop-filter:blur(20px);
  padding:12px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:sticky;
  top:0;
  z-index:100;
  border-bottom:1px solid var(--border);
}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.logo-img{height:32px;border-radius:8px;}
.logo-name{font-family:var(--fh);font-weight:800;font-size:1rem;color:var(--ink);}
.logo-name em{color:var(--red);font-style:normal;}
.header-right{display:flex;gap:8px;}
.cart-icon{
  position:relative;
  background:var(--bg3);
  border:1px solid var(--border);
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  color:var(--mid);
  transition:all 0.2s;
}
.cart-icon:hover{background:var(--red-dim);border-color:var(--red);color:var(--red);}
.cart-count{
  position:absolute;
  top:-4px;
  right:-4px;
  background:var(--red);
  color:#fff;
  font-size:10px;
  font-weight:800;
  width:18px;
  height:18px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
.banner{
  background:linear-gradient(135deg, #1a0a2e, #0d0b1a);
  padding:20px 5% 28px;
}
.banner h1{
  font-family:var(--fh);
  font-size:1.6rem;
  font-weight:800;
  line-height:1.2;
  margin-bottom:4px;
}
.banner h1 span{color:var(--red);}
.banner p{font-size:.75rem;color:var(--muted);}
.banner-tag{
  display:inline-block;
  background:rgba(46,204,113,0.12);
  padding:4px 12px;
  border-radius:50px;
  font-size:.65rem;
  font-weight:600;
  color:var(--green);
  margin-top:12px;
}
.category-scroll{
  padding:16px 5%;
  display:flex;
  gap:10px;
  overflow-x:auto;
  scrollbar-width:none;
  border-bottom:1px solid var(--border);
}
.category-scroll::-webkit-scrollbar{display:none;}
.chip{
  padding:8px 18px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:50px;
  font-size:.75rem;
  font-weight:600;
  white-space:nowrap;
  cursor:pointer;
  transition:all 0.18s;
  color:var(--mid);
}
.chip.active{background:var(--red);border-color:var(--red);color:#fff;}

.filter-bar{
  padding:16px 5%;
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  align-items:center;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
}
.search-wrapper{
  flex:2;
  min-width:200px;
  position:relative;
}
.search-icon{
  position:absolute;
  left:14px;
  top:50%;
  transform:translateY(-50%);
  color:var(--muted);
  font-size:16px;
}
.search-input{
  width:100%;
  padding:12px 16px 12px 42px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:40px;
  color:var(--ink);
  font-size:13px;
}
.search-input:focus{
  outline:none;
  border-color:var(--gold);
}
.sort-select{
  padding:12px 20px;
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:40px;
  color:var(--ink);
  font-size:13px;
  cursor:pointer;
}
.clear-btn{
  padding:12px 20px;
  background:transparent;
  border:1px solid var(--border);
  border-radius:40px;
  color:var(--muted);
  cursor:pointer;
  font-size:13px;
  transition:all 0.2s;
}
.clear-btn:hover{
  background:var(--red-dim);
  border-color:var(--red);
  color:var(--red);
}
.results-count{
  font-size:12px;
  color:var(--muted);
  padding:0 5%;
  margin-top:12px;
}

.product-grid{
  padding:20px 5%;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
  gap:16px;
}
.product-card{
  background:var(--card);
  border-radius:var(--radius-sm);
  overflow:hidden;
  border:1px solid var(--border);
  transition:transform 0.2s, border-color 0.2s;
  position:relative;
}
.product-card:hover{transform:translateY(-3px);border-color:var(--red);}
.pc-img{
  width:100%;
  height:130px;
  object-fit:cover;
  background:var(--bg3);
}
.pc-badge{
  position:absolute;
  top:8px;
  left:8px;
  padding:3px 10px;
  border-radius:50px;
  font-size:.6rem;
  font-weight:700;
  text-transform:uppercase;
  z-index:2;
}
.badge-hot{background:var(--red);color:#fff;}
.badge-local{background:var(--gold);color:#0a0a0f;}
.badge-prem{background:linear-gradient(135deg,#9b59b6,#8e44ad);color:#fff;}
.stock-badge{
  position:absolute;
  top:8px;
  right:8px;
  padding:3px 8px;
  border-radius:50px;
  font-size:.55rem;
  font-weight:700;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(4px);
}
.stock-out{color:var(--red);}
.stock-in{color:var(--green);}
.img-wrap{position:relative;}
.pc-info{padding:12px;}
.pc-name{font-weight:700;font-size:.85rem;margin-bottom:4px;line-height:1.3;}
.pc-category{font-size:.6rem;color:var(--muted);margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;}
.pc-price{font-weight:800;font-size:1rem;color:var(--red);margin:6px 0;}
.add-to-cart{
  width:100%;
  padding:8px;
  background:var(--red-dim);
  border:1px solid var(--border);
  border-radius:30px;
  color:var(--red);
  font-weight:700;
  font-size:.7rem;
  cursor:pointer;
  transition:all 0.15s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.add-to-cart:hover:not(:disabled){background:var(--red);color:#fff;}
.add-to-cart:disabled{
  opacity:0.5;
  cursor:not-allowed;
  background:var(--bg3);
  color:var(--muted);
}
.bottom-nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(10,10,15,0.96);
  backdrop-filter:blur(20px);
  display:flex;
  justify-content:space-around;
  padding:10px 5% 20px;
  border-top:1px solid var(--border);
  z-index:100;
}
.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  cursor:pointer;
  color:var(--muted);
  font-size:.7rem;
  font-weight:600;
}
.nav-item.active{color:var(--red);}
.nav-item i{font-size:20px;}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
.snack{
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:var(--bg3);
  border:1px solid var(--green);
  padding:10px 20px;
  border-radius:50px;
  font-size:.75rem;
  opacity:0;
  transition:opacity 0.2s;
  z-index:200;
  pointer-events:none;
}
.snack.on{opacity:1;}
</style>
</head>
<body>

<div class="app-header">
  <a class="logo" href="login.html">
    <img class="logo-img" src="https://i.postimg.cc/PxwLVrdh/227a55e3-ad16-4893-9e87-03dfc202814f.png" alt="LiquorBelle">
    <span class="logo-name">Liquor<em>Belle</em></span>
  </a>
  <div class="header-right">
    <div class="cart-icon" onclick="window.location.href='checkout.html'">
      <i class="ph ph-shopping-bag"></i>
      <span class="cart-count" id="cartCount">0</span>
    </div>
  </div>
</div>

<div class="banner">
  <h1>Dagoretti's <span>Finest</span></h1>
  <p>Whisky • Cognac • Brandy • Vodka • Gin • Rum • Wine • Beer • Champagne • Kenyan Spirits</p>
  <div class="banner-tag">⚡ 45-min delivery • 24/7 Service</div>
</div>

<div class="category-scroll" id="categoryList"></div>

<div class="filter-bar">
  <div class="search-wrapper">
    <i class="ph ph-magnifying-glass search-icon"></i>
    <input type="text" id="searchInput" class="search-input" placeholder="Search products...">
  </div>
  <select id="sortSelect" class="sort-select">
    <option value="default">Sort by</option>
    <option value="price-asc">Price: Low to High</option>
    <option value="price-desc">Price: High to Low</option>
    <option value="name-asc">Name: A to Z</option>
  </select>
  <button class="clear-btn" id="clearBtn">Clear</button>
</div>
<div id="resultsCount" class="results-count"></div>

<div class="product-grid" id="productGrid"></div>

<div class="bottom-nav">
  <div class="nav-item" onclick="window.location.href='index.html'"><i class="ph ph-house"></i><span>Home</span></div>
  <div class="nav-item active" onclick="window.location.href='shop.html'"><i class="ph ph-wine"></i><span>Shop</span></div>
  <div class="nav-item" onclick="window.location.href='checkout.html'"><i class="ph ph-shopping-bag"></i><span>Cart</span></div>
  <div class="nav-item" id="shopBottomAccountBtn" onclick="goToAccount()"><i class="ph ph-user"></i><span>Account</span></div>
</div>

<div class="snack" id="snack"></div>

<script>
const API_BASE = 'https://liquorbelle-mpesa-backend.onrender.com';
const PRODUCT_IMAGE = "https://i.postimg.cc/DzB8Bvmx/glass-whiskey-with-ice-bottle-with-label-vector-hand-drawn-color-illustration-168440-913.avif";
const CATEGORIES = ['All','Whisky','Cognac','Vodka','Gin','Rum','Wine','Beer','Champagne','Kenyan Spirits'];

let PRODUCTS = [];
let cart = JSON.parse(localStorage.getItem('liquorbelle_cart') || '{}');
let currentCat = new URLSearchParams(location.search).get('cat') || 'all';
let searchTerm = '';
let currentSort = 'default';

function goToAccount() {
  const currentUser = localStorage.getItem('liquorbelle_user');
  if (currentUser) {
    window.location.href = 'account.html';
  } else {
    window.location.href = 'login.html';
  }
}

async function loadProducts(){
  try {
    const res = await fetch(`${API_BASE}/api/db/products`);
    const data = await res.json();
    if(data.success && data.products.length > 0){
      PRODUCTS = data.products;
      console.log('✅ Loaded', PRODUCTS.length, 'products from database');
    } else {
      console.log('⚠️ No products in database');
      PRODUCTS = [];
    }
  } catch(e){
    console.error('Error loading products:', e);
    PRODUCTS = [];
  }
  render();
}

function updateCartCount(){
  const count = Object.values(cart).reduce((s,i)=>s+i.qty,0);
  document.getElementById('cartCount').innerText = count;
}

function getCategoryDisplayName(cat){
  const map = {
    'whisky':'Whisky','cognac':'Cognac','vodka':'Vodka','gin':'Gin',
    'rum':'Rum','wine':'Wine','beer':'Beer','champagne':'Champagne','kenyan':'Kenyan Spirits'
  };
  return map[cat] || cat;
}

function getStockStatus(product){
  if(product.stock === null || product.stock === undefined) return { text: 'In Stock', class: 'stock-in' };
  if(product.stock <= 0) return { text: 'Out of Stock', class: 'stock-out' };
  return { text: 'In Stock', class: 'stock-in' };
}

function sortProducts(products){
  const sorted = [...products];
  switch(currentSort){
    case 'price-asc': return sorted.sort((a,b) => (a.price || 0) - (b.price || 0));
    case 'price-desc': return sorted.sort((a,b) => (b.price || 0) - (a.price || 0));
    case 'name-asc': return sorted.sort((a,b) => (a.name || '').localeCompare(b.name || ''));
    default: return sorted;
  }
}

function render(){
  let filtered = [...PRODUCTS];
  if(currentCat !== 'all') filtered = filtered.filter(p => p.category === currentCat);
  if(searchTerm) filtered = filtered.filter(p => 
    p.name?.toLowerCase().includes(searchTerm) || 
    p.category?.toLowerCase().includes(searchTerm) ||
    (p.sub && p.sub.toLowerCase().includes(searchTerm))
  );
  filtered = sortProducts(filtered);
  
  const countText = document.getElementById('resultsCount');
  countText.innerHTML = filtered.length === 0 ? 'No products found' : `Found ${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;
  
  const grid = document.getElementById('productGrid');
  if(!filtered.length){
    grid.innerHTML = `<div class="empty-state">
      <i class="ph ph-wine" style="font-size:48px;opacity:0.5;"></i>
      <p>No products found</p>
      <small style="color:var(--muted);">Try a different search or category</small>
    </div>`;
    return;
  }
  
  grid.innerHTML = filtered.map(p => {
    const imgUrl = p.image && p.image.trim() !== '' ? p.image : PRODUCT_IMAGE;
    const badgeHtml = p.badge === 'hot' ? '<div class="pc-badge badge-hot">🔥 HOT</div>' :
                      p.badge === 'local' ? '<div class="pc-badge badge-local">🇰🇪 LOCAL</div>' :
                      p.badge === 'prem' ? '<div class="pc-badge badge-prem">⭐ PREMIUM</div>' : '';
    const stockStatus = getStockStatus(p);
    const isOutOfStock = p.stock !== null && p.stock <= 0;
    
    return `
      <div class="product-card">
        <div class="img-wrap">
          <img class="pc-img" src="${imgUrl}" onerror="this.src='${PRODUCT_IMAGE}'" alt="${escapeHtml(p.name)}">
          ${badgeHtml}
          <div class="stock-badge ${stockStatus.class}">${stockStatus.text}</div>
        </div>
        <div class="pc-info">
          <div class="pc-name">${escapeHtml(p.name)}</div>
          <div class="pc-category">
            <span>${getCategoryDisplayName(p.category)}</span>
          </div>
          <div class="pc-price">KES ${(p.price || 0).toLocaleString()}</div>
          <button class="add-to-cart" onclick="addToCart(${p.id},'${escapeHtml(p.name).replace(/'/g,"\\'")}',${p.price || 0})" ${isOutOfStock ? 'disabled' : ''}>
            <i class="ph ${isOutOfStock ? 'ph-x-circle' : 'ph-plus'}"></i> ${isOutOfStock ? 'Out of Stock' : 'Add to Cart'}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function addToCart(id,name,price){
  const product = PRODUCTS.find(p => p.id === id);
  if(product && product.stock !== null && product.stock <= 0){
    toast('Out of stock!');
    return;
  }
  if(!price || price <= 0){ toast('Price error'); return; }
  if(cart[id]) cart[id].qty++;
  else cart[id] = {name, price, qty:1, id, img:''};
  localStorage.setItem('liquorbelle_cart', JSON.stringify(cart));
  updateCartCount();
  toast(`${name} added to cart ✓`);
}

function escapeHtml(str){ 
  if(!str) return '';
  return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); 
}

function toast(msg){ 
  const t=document.getElementById('snack'); 
  t.innerText=msg; 
  t.classList.add('on'); 
  setTimeout(()=>t.classList.remove('on'),2000); 
}

function renderCategories(){
  const container = document.getElementById('categoryList');
  container.innerHTML = CATEGORIES.map(c => {
    const catKey = c === 'All' ? 'all' : c.toLowerCase().replace(' ', '');
    return `<div class="chip ${currentCat === catKey ? 'active' : ''}" onclick="setCategory('${catKey}')">${c}</div>`;
  }).join('');
}

function setCategory(cat){
  currentCat = cat;
  renderCategories();
  render();
  const url = new URL(window.location);
  cat === 'all' ? url.searchParams.delete('cat') : url.searchParams.set('cat', cat);
  window.history.pushState({}, '', url);
}

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchTerm = e.target.value.toLowerCase();
  render();
});
document.getElementById('sortSelect').addEventListener('change', (e) => {
  currentSort = e.target.value;
  render();
});
document.getElementById('clearBtn').addEventListener('click', () => {
  searchTerm = '';
  currentSort = 'default';
  document.getElementById('searchInput').value = '';
  document.getElementById('sortSelect').value = 'default';
  render();
});

renderCategories();
loadProducts();
updateCartCount();
setInterval(loadProducts, 30000);
</script>
</body>
</html>
